<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 포켓몬 — Pokénova</title>
  <meta name="description" content="몬스터볼을 눌러 오늘의 포켓몬을 만나보세요. 포켓몬을 보관하거나 놓아줄 수 있어요.">
  <meta property="og:title" content="오늘의 포켓몬 — Pokénova">
  <meta property="og:description" content="몬스터볼을 눌러 오늘의 포켓몬을 만나보세요">
  <meta property="og:url" content="https://pokenova.vercel.app/today.html">
  <meta property="og:image" content="https://pokenova.vercel.app/sprites/pokemon/25.png">
  <meta property="og:type" content="website">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow-x: hidden; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 68px 16px 60px;
      overflow-x: hidden;
    }

    /* ══ 헤더 ══ */
    .site-header-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(10,10,10,0.97);
      border-bottom: 1px solid #1a1a1a;
      display: flex; align-items: center;
      padding: 0 20px;
      z-index: 200;
      backdrop-filter: blur(12px);
    }
    .site-header-inner {
      width: 100%; max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
    }
    .site-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-ball {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(180deg, #e53935 50%, #fff 50%);
      border: 2px solid #333; position: relative;
    }
    .logo-ball::after {
      content: ''; position: absolute;
      left: 50%; top: 50%; transform: translate(-50%,-50%);
      width: 6px; height: 6px;
      background: #fff; border-radius: 50%; border: 1.5px solid #555;
    }
    .logo-text { font-size: 1.05rem; font-weight: 900; color: #f0f0f0; letter-spacing: -0.3px; }
    .logo-text span { color: #e53935; }
    .site-nav { display: flex; align-items: center; gap: 4px; margin-left: 12px; flex-wrap: wrap; }
    .site-nav-btn {
      padding: 5px 10px; min-height: 36px;
      border-radius: 8px; text-decoration: none;
      color: #666; font-size: 0.8rem; font-weight: 600;
      transition: color .15s, background .15s; white-space: nowrap;
    }
    .site-nav-btn:hover { color: #ccc; background: #1a1a1a; }
    .site-nav-btn.active { color: #e53935; }
    .hamburger-btn {
      display: none; background: none; border: none;
      color: #888; font-size: 1.3rem; cursor: pointer;
      padding: 8px; min-height: 44px; min-width: 44px; border-radius: 8px;
    }
    @media (max-width: 640px) {
      .hamburger-btn { display: flex; align-items: center; justify-content: center; margin-left: auto; }
      .site-nav {
        display: none; position: fixed; top: 52px; left: 0; right: 0;
        background: rgba(10,10,10,0.98); flex-direction: column; padding: 12px;
        border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(12px); z-index: 199;
      }
      .site-nav.open { display: flex; }
      .site-nav-btn { width: 100%; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; }
    }

    /* ══ 메인 ══ */
    .page-title { font-size: 1.6rem; font-weight: 900; text-align: center; margin-bottom: 4px; letter-spacing: -0.5px; }
    .page-title span { color: #f5c518; }
    .page-sub { font-size: 0.82rem; color: #555; text-align: center; margin-bottom: 28px; }

    .gacha-wrap { width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; gap: 20px; }

    /* ══ 비디오 스테이지 ══ */
    .video-stage {
      width: 100%; max-width: 520px;
      position: relative; border-radius: 18px; overflow: hidden;
      background: #0d0d0d; border: 1px solid #1e1e1e;
      cursor: pointer; user-select: none;
    }
    .video-stage video { width: 100%; display: block; border-radius: 18px; }
    #frame-canvas {
      width: 100%; display: block; border-radius: 18px;
      position: absolute; inset: 0;
    }
    .video-stage.started #frame-canvas { display: none; }
    .click-hint {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 20px; border-radius: 18px;
      pointer-events: none; transition: opacity .4s;
    }
    .click-hint.hidden { opacity: 0; }
    .click-hint-text {
      font-size: 0.88rem; color: #fff; font-weight: 700; letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      background: rgba(0,0,0,0.55); padding: 6px 18px; border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    .video-fallback {
      width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
      border-radius: 18px; font-size: 5rem;
    }

    /* ══ 포켓몬 카드 ══ */
    .pokemon-card {
      width: 100%; max-width: 520px;
      background: #111; border: 1px solid #222; border-radius: 18px;
      padding: 28px 24px; display: none; flex-direction: column;
      align-items: center; gap: 14px;
      animation: cardAppear .5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .pokemon-card.visible { display: flex; }
    @keyframes cardAppear {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .pokemon-sprite {
      width: 180px; height: 180px; object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(245,197,24,0.25));
      animation: spriteFloat 3s ease-in-out infinite;
    }
    @keyframes spriteFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .pokemon-number { font-size: 0.72rem; color: #444; letter-spacing: 2px; }
    .pokemon-name { font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; }
    .pokemon-name-en { font-size: 0.8rem; color: #555; margin-top: -6px; }
    .types-wrap { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .type-badge { padding: 4px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    /* 특성 */
    .ability-row {
      display: flex; align-items: center; gap: 8px;
      background: #0d0d0d; border: 1px solid #1e1e1e;
      border-radius: 10px; padding: 9px 14px; width: 100%;
    }
    .ability-label { font-size: 0.68rem; color: #555; letter-spacing: 1px; white-space: nowrap; }
    .ability-name { font-size: 0.92rem; font-weight: 700; color: #f0f0f0; }
    /* 능력치 미니 그리드 */
    .stats-mini { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; width: 100%; }
    .stat-mini {
      background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 8px;
      padding: 7px 2px; display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .stat-mini-label { font-size: 0.58rem; color: #555; letter-spacing: .5px; font-weight: 700; text-transform: uppercase; }
    .stat-mini-val { font-size: 1.05rem; font-weight: 900; line-height: 1; }
    .stat-mini-bar { width: 80%; height: 3px; background: #252525; border-radius: 2px; overflow: hidden; }
    .stat-mini-fill { height: 100%; border-radius: 2px; }

    /* 액션 버튼 */
    .action-btns { display: flex; gap: 10px; width: 100%; }
    .btn-keep {
      flex: 1; padding: 13px; border-radius: 12px;
      background: linear-gradient(135deg, #f5c518, #e6b800);
      color: #000; font-size: 0.95rem; font-weight: 800;
      border: none; cursor: pointer; transition: transform .15s, box-shadow .15s; min-height: 48px;
    }
    .btn-keep:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,197,24,0.4); }
    .btn-release {
      flex: 1; padding: 13px; border-radius: 12px;
      background: transparent; border: 1.5px solid #2e2e2e;
      color: #888; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: border-color .15s, color .15s, transform .15s; min-height: 48px;
    }
    .btn-release:hover { border-color: #4caf50; color: #4caf50; transform: translateY(-2px); }

    /* 오늘 완료 메시지 */
    .daily-done-msg {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      background: #0d0d0d; border: 1px solid #1e1e1e;
      font-size: 0.85rem; color: #555; text-align: center; line-height: 1.7;
    }
    .daily-done-msg b { color: #888; }

    /* ══ 토스트 ══ */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e1e1e; border: 1px solid #333; border-radius: 50px; padding: 10px 22px;
      font-size: 0.88rem; font-weight: 600; color: #f0f0f0;
      transition: transform .35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 500; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ══ 컬렉션 ══ */
    .collection-section { width: 100%; max-width: 520px; margin-top: 12px; }
    .collection-toggle {
      width: 100%; padding: 11px 16px;
      background: transparent; border: 1px solid #1e1e1e;
      border-radius: 12px; color: #555; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color .15s, color .15s; min-height: 44px;
    }
    .collection-toggle:hover { border-color: #333; color: #aaa; }
    .collection-toggle .coll-count { background: #1e1e1e; border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; color: #888; }
    .collection-grid { display: none; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .collection-grid.open { display: flex; }
    .coll-chip {
      display: flex; align-items: center; gap: 8px;
      background: #111; border: 1px solid #222;
      border-radius: 10px; padding: 6px 10px 6px 6px;
      font-size: 0.8rem; color: #ccc;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .coll-chip:hover { border-color: #f5c518; background: #161608; }
    .coll-chip img { width: 32px; height: 32px; object-fit: contain; }
    .coll-chip .coll-name { font-weight: 600; }
    .coll-chip .coll-date { font-size: 0.7rem; color: #444; display: block; }
    .coll-empty { color: #444; font-size: 0.82rem; padding: 16px 0; text-align: center; width: 100%; }
    .btn-coll-clear {
      margin-top: 10px; padding: 7px 14px;
      background: transparent; border: 1px solid #252525;
      border-radius: 8px; color: #444; font-size: 0.75rem;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .btn-coll-clear:hover { border-color: #e53935; color: #e53935; }

    /* ══ 교체 선택 모달 ══ */
    .swap-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.82); z-index: 450;
      align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(6px);
    }
    .swap-overlay.open { display: flex; }
    .swap-box {
      background: #111; border: 1px solid #222; border-radius: 20px;
      padding: 22px 18px; max-width: 480px; width: 100%;
      max-height: 80vh; display: flex; flex-direction: column; gap: 14px;
      position: relative;
    }
    .swap-title { font-size: 1rem; font-weight: 800; text-align: center; }
    .swap-sub { font-size: 0.78rem; color: #555; text-align: center; margin-top: -6px; }
    .swap-new-chip {
      display: flex; align-items: center; gap: 10px;
      background: #0d1a00; border: 1.5px solid #4caf50;
      border-radius: 12px; padding: 10px 14px;
    }
    .swap-new-chip img { width: 40px; height: 40px; object-fit: contain; }
    .swap-new-chip .swap-new-name { font-weight: 800; font-size: 0.95rem; }
    .swap-new-chip .swap-new-label { font-size: 0.7rem; color: #4caf50; }
    .swap-list {
      overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
      flex: 1; padding-right: 4px;
    }
    .swap-list::-webkit-scrollbar { width: 4px; }
    .swap-list::-webkit-scrollbar-track { background: #0a0a0a; }
    .swap-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    .swap-item {
      display: flex; align-items: center; gap: 10px;
      background: #141414; border: 1.5px solid #1e1e1e;
      border-radius: 10px; padding: 8px 12px;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .swap-item:hover { border-color: #e53935; background: #1a0a0a; }
    .swap-item.selected { border-color: #e53935; background: #1a0a0a; }
    .swap-item img { width: 36px; height: 36px; object-fit: contain; }
    .swap-item-name { font-weight: 700; font-size: 0.88rem; flex: 1; }
    .swap-item-date { font-size: 0.7rem; color: #444; }
    .swap-item-release { font-size: 0.75rem; color: #e53935; font-weight: 600; opacity: 0; transition: opacity .15s; }
    .swap-item:hover .swap-item-release, .swap-item.selected .swap-item-release { opacity: 1; }
    .swap-confirm {
      padding: 12px; border-radius: 12px;
      background: linear-gradient(135deg, #e53935, #c62828);
      color: #fff; font-size: 0.92rem; font-weight: 800;
      border: none; cursor: pointer; min-height: 46px;
      transition: opacity .15s;
    }
    .swap-confirm:disabled { opacity: .35; cursor: default; }
    .swap-cancel {
      padding: 9px; border-radius: 12px;
      background: transparent; border: 1px solid #252525;
      color: #555; font-size: 0.82rem; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .swap-cancel:hover { border-color: #555; color: #aaa; }

    /* ══ 상세 모달 ══ */
    .detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 400;
      align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(6px);
    }
    .detail-overlay.open { display: flex; }
    .detail-box {
      background: #111; border: 1px solid #222; border-radius: 20px;
      padding: 28px 24px; max-width: 400px; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      position: relative;
      animation: cardAppear .35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .detail-close {
      position: absolute; top: 14px; right: 14px;
      background: #1e1e1e; border: 1px solid #2e2e2e; border-radius: 50%;
      width: 32px; height: 32px; color: #666; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: color .15s, border-color .15s;
    }
    .detail-close:hover { color: #fff; border-color: #555; }
    .detail-sprite { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 6px 18px rgba(245,197,24,0.2)); }
    .detail-number { font-size: 0.7rem; color: #444; letter-spacing: 2px; }
    .detail-name { font-size: 1.6rem; font-weight: 900; }
    .detail-name-en { font-size: 0.78rem; color: #555; margin-top: -4px; }
    .detail-caught {
      font-size: 0.78rem; color: #555;
      background: #0d0d0d; border: 1px solid #1e1e1e;
      border-radius: 20px; padding: 4px 14px;
    }
    .detail-caught span { color: #888; }
    .detail-ability-row {
      display: flex; align-items: center; gap: 8px;
      background: #0d0d0d; border: 1px solid #1e1e1e;
      border-radius: 10px; padding: 8px 12px; width: 100%;
    }
  </style>
</head>
<body>

<!-- ══ 헤더 ══ -->

      <a href="today.html"   class="site-nav-btn active">오늘의 포켓몬</a>
    </nav>
  </div>
</div>

<!-- ══ 메인 ══ -->
<div class="page-title">오늘의 <span>포켓몬</span></div>
<div class="page-sub" id="page-sub">몬스터볼을 눌러 오늘의 포켓몬을 만나보세요</div>

<div class="gacha-wrap">

  <!-- 비디오 스테이지 -->
  <div class="video-stage" id="video-stage" onclick="onStageClick()">
    <video id="pokeball-video" src="videos/pokeball-open.mp4"
           muted playsinline preload="metadata" onended="onVideoEnded()"></video>
    <canvas id="frame-canvas"></canvas>
    <div class="video-fallback" id="video-fallback" style="display:none">⚾</div>
    <div class="click-hint" id="click-hint">
      <div class="click-hint-text">👆 눌러서 포켓몬 뽑기</div>
    </div>
  </div>

  <!-- 포켓몬 카드 -->
  <div class="pokemon-card" id="pokemon-card">

    <div class="pokemon-name" id="poke-name">—</div>
    <div class="pokemon-name-en" id="poke-name-en">—</div>
    <div class="types-wrap" id="poke-types"></div>
    <div class="ability-row" id="poke-ability-row">
      <span class="ability-label">특성</span>
      <span class="ability-name" id="poke-ability">—</span>
    </div>
    <div class="stats-mini" id="poke-stats"></div>
    <div class="action-btns" id="action-btns">
      <button class="btn-keep"    onclick="keepPokemon()">🎒 보관하기</button>
      <button class="btn-release" onclick="releasePokemon()">🌿 놓아주기</button>
    </div>
    <div class="daily-done-msg" id="daily-done-msg" style="display:none"></div>
  </div>

  <!-- 컬렉션 -->
  <div class="collection-section">
    <button class="collection-toggle" onclick="toggleCollection()">
      <span>🗂️ 내 컬렉션</span>
      <span class="coll-count" id="coll-count">0마리</span>
    </button>
    <div class="collection-grid" id="collection-grid"></div>
  </div>

</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 교체 선택 모달 -->
<div class="swap-overlay" id="swap-overlay">
  <div class="swap-box">
    <div class="swap-title">🗂️ 컬렉션이 가득 찼어요</div>
    <div class="swap-sub">놓아줄 포켓몬을 골라주세요 (1마리)</div>
    <div class="swap-new-chip" id="swap-new-chip">
      <img id="swap-new-img" src="" alt="">
      <div>
        <div class="swap-new-label">보관하려는 포켓몬</div>
        <div class="swap-new-name" id="swap-new-name"></div>
      </div>
    </div>
    <div class="swap-list" id="swap-list"></div>
    <button class="swap-confirm" id="swap-confirm-btn" onclick="confirmSwap()" disabled>놓아주고 보관하기</button>
    <button class="swap-cancel" onclick="closeSwap()">취소</button>
  </div>
</div>

<!-- 상세 모달 -->
<div class="detail-overlay" id="detail-overlay" onclick="onOverlayClick(event)">
  <div class="detail-box" id="detail-box">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-number" id="d-number"></div>
    <img class="detail-sprite" id="d-sprite" src="" alt="" />
    <div class="detail-name" id="d-name"></div>
    <div class="detail-name-en" id="d-name-en"></div>
    <div class="types-wrap" id="d-types"></div>
    <div class="detail-caught">📅 <span id="d-date"></span> 에 만남</div>
    <div class="detail-ability-row">
      <span class="ability-label">특성</span>
      <span class="ability-name" id="d-ability">—</span>
    </div>
    <div class="stats-mini" id="d-stats"></div>
  </div>
</div>

<script>
/* ══ 모바일 nav ══ */
function toggleMobileNav() {
  document.getElementById('site-nav').classList.toggle('open');
}
document.addEventListener('click', e => {
  const nav = document.getElementById('site-nav');
  const btn = document.getElementById('hamburger-btn');
  if (nav.classList.contains('open') && !nav.contains(e.target) && e.target !== btn) {
    nav.classList.remove('open');
  }
});

/* ══ 타입 색상 ══ */
const TYPE_COLOR = {
  노말:'#9099A1',불꽃:'#F08030',물:'#6890F0',전기:'#F8D030',
  풀:'#78C850',얼음:'#98D8D8',격투:'#C03028',독:'#A040A0',
  땅:'#E0C068',비행:'#A890F0',에스퍼:'#F85888',벌레:'#A8B820',
  바위:'#B8A038',고스트:'#705898',드래곤:'#7038F8',악:'#705848',
  강철:'#B8B8D0',페어리:'#EE99AC'
};

/* ══ 상태 ══ */
let pokemonDB = [];
let statsMap = {};  // ko → stats
let currentPokemon = null;
let revealed = false;

const STAT_META = [
  { key:'H', label:'HP',  color:'#f08030' },
  { key:'A', label:'ATK', color:'#e53935' },
  { key:'B', label:'DEF', color:'#f5c518' },
  { key:'C', label:'S.ATK',color:'#7c4dff'},
  { key:'D', label:'S.DEF',color:'#00acc1'},
  { key:'S', label:'SPD', color:'#43a047' },
];

function renderStatsMini(stats, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!stats) { el.innerHTML = ''; return; }
  el.innerHTML = STAT_META.map(m => {
    const val = stats[m.key] || 0;
    const pct = Math.round(val / 255 * 100);
    return `<div class="stat-mini">
      <div class="stat-mini-label">${m.label}</div>
      <div class="stat-mini-val" style="color:${m.color}">${val}</div>
      <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${pct}%;background:${m.color}"></div></div>
    </div>`;
  }).join('');
}

function getRandomAbility(abilities) {
  if (!abilities || !abilities.length) return null;
  const names = abilities.map(a => typeof a === 'string' ? a : (a.ko || '')).filter(Boolean);
  return names.length ? names[Math.floor(Math.random() * names.length)] : null;
}

/* ══ 날짜 유틸 ══ */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function displayDate(str) {
  // 'YYYY-MM-DD' → 'M/D'
  const [, m, d] = (str||'').split('-');
  return m && d ? `${parseInt(m)}/${parseInt(d)}` : str;
}

/* ══ 하루 기록 ══ */
function getDailyRecord() {
  try { return JSON.parse(localStorage.getItem('pokenova_daily') || 'null'); }
  catch(e) { return null; }
}
function saveDailyRecord(obj) {
  localStorage.setItem('pokenova_daily', JSON.stringify(obj));
}

/* ══ 컬렉션 ══ */
function getCollection() {
  try { return JSON.parse(localStorage.getItem('pokenova_collection') || '[]'); }
  catch(e) { return []; }
}

/* ══ 데이터 로드 ══ */
async function loadData() {
  try {
    const [raw, statsRaw] = await Promise.all([
      fetch('data/quiz_pokemon.json').then(r => r.json()),
      fetch('data/pokemon_stats.json').then(r => r.json()),
    ]);
    pokemonDB = raw.filter(p => p.id && p.id <= 1025);
    statsRaw.forEach(p => { if (p.ko) statsMap[p.ko] = p.stats; });
  } catch(e) { console.warn('데이터 로드 실패', e); }
}

/* ══ 비디오 ══ */
const video = document.getElementById('pokeball-video');
const frameCanvas = document.getElementById('frame-canvas');

// 첫 프레임을 canvas에 캡처 → 클릭 전 정지 화면으로 사용
function captureFirstFrame() {
  video.currentTime = 0.01;
}
video.addEventListener('loadedmetadata', captureFirstFrame);
video.addEventListener('seeked', function onSeeked() {
  if (document.getElementById('video-stage').classList.contains('started')) return;
  try {
    frameCanvas.width  = video.videoWidth;
    frameCanvas.height = video.videoHeight;
    frameCanvas.getContext('2d').drawImage(video, 0, 0);
  } catch(e) { /* cross-origin 등 실패 시 무시 */ }
  video.removeEventListener('seeked', onSeeked);
});
video.addEventListener('error', () => {
  document.getElementById('video-fallback').style.display = '';
  frameCanvas.style.display = 'none';
  video.style.display = 'none';
});

/* ══ 스테이지 클릭 ══ */
function onStageClick() {
  if (revealed) return;
  document.getElementById('click-hint').classList.add('hidden');
  document.getElementById('video-stage').classList.add('started');
  video.currentTime = 0;
  video.play().catch(() => revealPokemon());
}

function onVideoEnded() {
  document.getElementById('video-stage').style.display = 'none';
  revealPokemon();
}

/* ══ 랜덤 포켓몬 (컬렉션 제외) ══ */
function pickRandom() {
  if (!pokemonDB.length) return null;
  const collIds = new Set(getCollection().map(p => p.id));
  let pool = pokemonDB.filter(p => !collIds.has(p.id));
  if (!pool.length) pool = pokemonDB; // 다 모은 경우 전체에서 뽑기
  return pool[Math.floor(Math.random() * pool.length)];
}

/* ══ 포켓몬 카드 채우기 ══ */
function fillCard(p) {
  document.getElementById('poke-number').textContent = `#${String(p.id).padStart(4,'0')}`;
  document.getElementById('poke-sprite').src = p.sprite;
  document.getElementById('poke-sprite').alt = p.ko;
  document.getElementById('poke-name').textContent = p.ko;
  document.getElementById('poke-name-en').textContent = p.en;
  document.getElementById('poke-types').innerHTML = (p.types||[]).map(t =>
    `<span class="type-badge" style="background:${TYPE_COLOR[t]||'#555'}">${t}</span>`
  ).join('');
  // 특성 — 뽑을 때 결정된 값 사용 (없으면 fallback)
  document.getElementById('poke-ability').textContent = p.chosenAbility || '—';
  // 능력치
  renderStatsMini(statsMap[p.ko] || null, 'poke-stats');
  document.getElementById('pokemon-card').classList.add('visible');
}

/* ══ 포켓몬 공개 ══ */
function revealPokemon() {
  revealed = true;
  const p = pickRandom();
  if (!p) return;

  // 특성을 뽑는 순간 1번만 결정
  const fullP = pokemonDB.find(x => x.id === p.id) || p;
  p.chosenAbility = getRandomAbility(fullP.abilities) || '—';
  currentPokemon = p;

  const rec = { date: todayStr(), id: p.id, ko: p.ko, en: p.en, sprite: p.sprite, types: p.types, abilities: p.abilities, chosenAbility: p.chosenAbility, action: null };
  saveDailyRecord(rec);

  fillCard(p);
  document.getElementById('action-btns').style.display = 'flex';
  document.getElementById('daily-done-msg').style.display = 'none';
}

/* ══ 보관하기 ══ */
function keepPokemon() {
  if (!currentPokemon) return;
  const coll = getCollection();
  if (coll.length >= 100) {
    openSwap();
    return;
  }
  doKeep();
}

function doKeep(releaseIdx = -1) {
  const p = currentPokemon;
  const coll = getCollection();
  const dateStr = todayStr();
  if (releaseIdx >= 0) {
    const released = coll.splice(releaseIdx, 1)[0];
    showToast(`🎉 ${p.ko}을(를) 보관했어요! (${released.ko} 놓아줌)`);
  } else {
    showToast(`🎉 ${p.ko}을(를) 보관했어요!`);
  }
  coll.unshift({ id: p.id, ko: p.ko, en: p.en, sprite: p.sprite, types: p.types, abilities: p.abilities, chosenAbility: p.chosenAbility || '—', caughtAt: dateStr });
  localStorage.setItem('pokenova_collection', JSON.stringify(coll));
  const rec = getDailyRecord();
  if (rec) { rec.action = 'keep'; saveDailyRecord(rec); }
  showDoneMsg('keep');
  renderCollection();
}

/* ══ 교체 선택 모달 ══ */
let swapSelectedIdx = -1;

function openSwap() {
  const p = currentPokemon;
  document.getElementById('swap-new-img').src = p.sprite;
  document.getElementById('swap-new-name').textContent = p.ko;
  swapSelectedIdx = -1;
  document.getElementById('swap-confirm-btn').disabled = true;

  const coll = getCollection();
  document.getElementById('swap-list').innerHTML = coll.map((c, i) => `
    <div class="swap-item" id="swap-item-${i}" onclick="selectSwapItem(${i})">
      <img src="${c.sprite}" alt="${c.ko}" onerror="this.style.display='none'">
      <span class="swap-item-name">${c.ko}</span>
      <span class="swap-item-date">${displayDate(c.caughtAt)}</span>
      <span class="swap-item-release">놓아주기 🌿</span>
    </div>
  `).join('');
  document.getElementById('swap-overlay').classList.add('open');
}

function selectSwapItem(idx) {
  if (swapSelectedIdx >= 0) {
    document.getElementById(`swap-item-${swapSelectedIdx}`)?.classList.remove('selected');
  }
  swapSelectedIdx = idx;
  document.getElementById(`swap-item-${idx}`)?.classList.add('selected');
  document.getElementById('swap-confirm-btn').disabled = false;
}

function confirmSwap() {
  if (swapSelectedIdx < 0) return;
  closeSwap();
  doKeep(swapSelectedIdx);
}

function closeSwap() {
  document.getElementById('swap-overlay').classList.remove('open');
  swapSelectedIdx = -1;
}

/* ══ 놓아주기 ══ */
function releasePokemon() {
  if (!currentPokemon) return;
  const rec = getDailyRecord();
  if (rec) { rec.action = 'release'; saveDailyRecord(rec); }
  showToast(`🌿 ${currentPokemon.ko}을(를) 놓아줬어요. 잘 가~`);
  showDoneMsg('release');
}

/* ══ 완료 메시지 표시 ══ */
function showDoneMsg(action) {
  document.getElementById('action-btns').style.display = 'none';
  const msg = document.getElementById('daily-done-msg');
  const d = displayDate(todayStr());
  if (action === 'keep') {
    msg.innerHTML = `✅ <b>${currentPokemon.ko}</b>을(를) 보관했어요!<br><span style="font-size:0.78rem">내일 새로운 포켓몬이 기다리고 있어요 🌙</span>`;
  } else {
    msg.innerHTML = `🌿 <b>${currentPokemon.ko}</b>을(를) 놓아줬어요<br><span style="font-size:0.78rem">내일 새로운 포켓몬이 기다리고 있어요 🌙</span>`;
  }
  msg.style.display = '';
}

/* ══ 토스트 ══ */
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ══ 컬렉션 렌더 ══ */
function toggleCollection() {
  const grid = document.getElementById('collection-grid');
  grid.classList.toggle('open');
  if (grid.classList.contains('open')) renderCollection();
}

function renderCollection() {
  const coll = getCollection();
  document.getElementById('coll-count').textContent = `${coll.length}마리`;
  const grid = document.getElementById('collection-grid');
  if (!coll.length) {
    grid.innerHTML = '<div class="coll-empty">아직 보관한 포켓몬이 없어요</div>';
    return;
  }
  grid.innerHTML = coll.map((p, i) => `
    <div class="coll-chip" onclick="openDetail(${i})">
      <img src="${p.sprite}" alt="${p.ko}" onerror="this.style.display='none'">
      <div>
        <div class="coll-name">${p.ko}</div>
        <span class="coll-date">${displayDate(p.caughtAt)}</span>
      </div>
    </div>
  `).join('');
  const clrBtn = document.createElement('button');
  clrBtn.className = 'btn-coll-clear';
  clrBtn.textContent = '🗑️ 컬렉션 비우기';
  clrBtn.onclick = clearCollection;
  grid.appendChild(clrBtn);
}

function clearCollection() {
  if (!confirm('컬렉션을 전부 비우시겠어요?')) return;
  localStorage.removeItem('pokenova_collection');
  renderCollection();
  showToast('컬렉션을 비웠어요');
}

/* ══ 상세 모달 ══ */
function openDetail(idx) {
  const coll = getCollection();
  const p = coll[idx];
  if (!p) return;
  document.getElementById('d-number').textContent = `#${String(p.id).padStart(4,'0')}`;
  document.getElementById('d-sprite').src = p.sprite;
  document.getElementById('d-name').textContent = p.ko;
  document.getElementById('d-name-en').textContent = p.en;
  document.getElementById('d-types').innerHTML = (p.types||[]).map(t =>
    `<span class="type-badge" style="background:${TYPE_COLOR[t]||'#555'}">${t}</span>`
  ).join('');
  document.getElementById('d-date').textContent = displayDate(p.caughtAt);
  document.getElementById('d-ability').textContent = p.chosenAbility || getRandomAbility(p.abilities) || '—';
  renderStatsMini(statsMap[p.ko] || null, 'd-stats');
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
}

/* ══ 초기화 ══ */
(async () => {
  await loadData();
  renderCollection();

  const rec = getDailyRecord();
  const today = todayStr();

  if (rec && rec.date === today) {
    // 오늘 이미 뽑음
    document.getElementById('video-stage').style.display = 'none';
    currentPokemon = { id: rec.id, ko: rec.ko, en: rec.en, sprite: rec.sprite, types: rec.types, abilities: rec.abilities, chosenAbility: rec.chosenAbility || null };
    // chosenAbility가 없는 이전 기록은 pokemonDB에서 다시 뽑지 않고 고정값 사용
    if (!currentPokemon.chosenAbility) {
      const fullP = pokemonDB.find(x => x.id === rec.id);
      currentPokemon.chosenAbility = getRandomAbility(fullP && fullP.abilities) || '—';
      rec.chosenAbility = currentPokemon.chosenAbility;
      saveDailyRecord(rec);
    }
    revealed = true;
    fillCard(currentPokemon);

    if (rec.action) {
      // 이미 보관/놓아줌
      document.getElementById('action-btns').style.display = 'none';
      const msg = document.getElementById('daily-done-msg');
      if (rec.action === 'keep') {
        msg.innerHTML = `✅ <b>${rec.ko}</b>을(를) 보관했어요!<br><span style="font-size:0.78rem">내일 새로운 포켓몬이 기다리고 있어요 🌙</span>`;
      } else {
        msg.innerHTML = `🌿 <b>${rec.ko}</b>을(를) 놓아줬어요<br><span style="font-size:0.78rem">내일 새로운 포켓몬이 기다리고 있어요 🌙</span>`;
      }
      msg.style.display = '';
      document.getElementById('page-sub').textContent = '오늘의 포켓몬이에요';
    } else {
      // 뽑았지만 아직 선택 안 함
      document.getElementById('action-btns').style.display = 'flex';
      document.getElementById('page-sub').textContent = '보관하거나 놓아줄 수 있어요';
    }
  }
})();
</script>

</body>
</html>
