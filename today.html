<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 포켓몬 — Pokénova</title>
  <meta name="description" content="몬스터볼을 눌러 오늘의 포켓몬을 만나보세요. 포켓몬을 보관하거나 놓아줄 수 있어요.">
  <meta property="og:title" content="오늘의 포켓몬 — Pokénova">
  <meta property="og:description" content="몬스터볼을 눌러 오늘의 포켓몬을 만나보세요">
  <meta property="og:url" content="https://pokenova.vercel.app/today.html">
  <meta property="og:image" content="https://pokenova.vercel.app/sprites/pokemon/25.png">
  <meta property="og:type" content="website">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow-x: hidden; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 68px 16px 60px;
      overflow-x: hidden;
    }

    /* ══ 헤더 ══ */
    .site-header-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(10,10,10,0.97);
      border-bottom: 1px solid #1a1a1a;
      display: flex; align-items: center;
      padding: 0 20px;
      z-index: 200;
      backdrop-filter: blur(12px);
    }
    .site-header-inner {
      width: 100%; max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
    }
    .site-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; flex-shrink: 0;
    }
    .logo-ball {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(180deg, #e53935 50%, #fff 50%);
      border: 2px solid #333; position: relative;
    }
    .logo-ball::after {
      content: ''; position: absolute;
      left: 50%; top: 50%; transform: translate(-50%,-50%);
      width: 6px; height: 6px;
      background: #fff; border-radius: 50%; border: 1.5px solid #555;
    }
    .logo-text { font-size: 1.05rem; font-weight: 900; color: #f0f0f0; letter-spacing: -0.3px; }
    .logo-text span { color: #e53935; }
    .site-nav { display: flex; align-items: center; gap: 4px; margin-left: 12px; flex-wrap: wrap; }
    .site-nav-btn {
      padding: 5px 10px; min-height: 36px;
      border-radius: 8px; text-decoration: none;
      color: #666; font-size: 0.8rem; font-weight: 600;
      transition: color .15s, background .15s;
      white-space: nowrap;
    }
    .site-nav-btn:hover { color: #ccc; background: #1a1a1a; }
    .site-nav-btn.active { color: #e53935; }
    .hamburger-btn {
      display: none; background: none; border: none;
      color: #888; font-size: 1.3rem; cursor: pointer;
      padding: 8px; min-height: 44px; min-width: 44px;
      border-radius: 8px;
    }
    @media (max-width: 640px) {
      .hamburger-btn { display: flex; align-items: center; justify-content: center; margin-left: auto; }
      .site-nav { display: none; position: fixed; top: 52px; left: 0; right: 0;
        background: rgba(10,10,10,0.98); flex-direction: column; padding: 12px;
        border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(12px); z-index: 199;
      }
      .site-nav.open { display: flex; }
      .site-nav-btn { width: 100%; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; }
    }

    /* ══ 메인 레이아웃 ══ */
    .page-title {
      font-size: 1.6rem; font-weight: 900;
      text-align: center; margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .page-title span { color: #f5c518; }
    .page-sub {
      font-size: 0.82rem; color: #555;
      text-align: center; margin-bottom: 28px;
    }

    /* ══ 뽑기 메인 영역 ══ */
    .gacha-wrap {
      width: 100%; max-width: 520px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    /* ══ 비디오 / 볼 영역 ══ */
    .video-stage {
      width: 100%; max-width: 520px;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      cursor: pointer;
      user-select: none;
    }
    .video-stage video {
      width: 100%;
      display: block;
      border-radius: 18px;
    }
    /* 클릭 힌트 오버레이 */
    .click-hint {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      background: rgba(0,0,0,0.25);
      border-radius: 18px;
      pointer-events: none;
      transition: opacity .4s;
    }
    .click-hint.hidden { opacity: 0; }
    .click-hint-ball {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(180deg, #e53935 50%, #fff 50%);
      border: 4px solid #555;
      position: relative;
      animation: floatBall 2.4s ease-in-out infinite;
      box-shadow: 0 8px 32px rgba(229,57,53,0.3);
    }
    .click-hint-ball::before {
      content: ''; position: absolute;
      left: 0; right: 0; top: calc(50% - 3px);
      height: 6px; background: #555;
    }
    .click-hint-ball::after {
      content: ''; position: absolute;
      left: 50%; top: 50%; transform: translate(-50%,-50%);
      width: 18px; height: 18px;
      background: #fff; border-radius: 50%; border: 3px solid #555;
    }
    @keyframes floatBall {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .click-hint-text {
      font-size: 0.9rem; color: #fff;
      font-weight: 700; letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.5);
      padding: 6px 16px; border-radius: 20px;
    }

    /* 비디오 없을 때 폴백 배경 */
    .video-fallback {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
      border-radius: 18px;
    }

    /* ══ 포켓몬 카드 ══ */
    .pokemon-card {
      width: 100%; max-width: 520px;
      background: #111;
      border: 1px solid #222;
      border-radius: 18px;
      padding: 28px 24px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: cardAppear .5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .pokemon-card.visible { display: flex; }
    @keyframes cardAppear {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .pokemon-sprite-wrap {
      position: relative;
    }
    .pokemon-sprite {
      width: 180px; height: 180px;
      object-fit: contain;
      image-rendering: auto;
      filter: drop-shadow(0 8px 24px rgba(245,197,24,0.25));
      animation: spriteFloat 3s ease-in-out infinite;
    }
    @keyframes spriteFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .pokemon-number { font-size: 0.72rem; color: #444; letter-spacing: 2px; }
    .pokemon-name { font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; }
    .pokemon-name-en { font-size: 0.8rem; color: #555; margin-top: -6px; }

    .types-wrap { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .type-badge {
      padding: 4px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700;
      color: #fff; letter-spacing: 0.5px;
    }

    .flavor-box {
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.88rem;
      line-height: 1.8;
      color: #bbb;
      text-align: center;
      width: 100%;
      min-height: 52px;
    }
    .flavor-loading { color: #444; font-size: 0.8rem; }

    /* ══ 액션 버튼 ══ */
    .action-btns {
      display: flex; gap: 10px; width: 100%;
    }
    .btn-keep {
      flex: 1; padding: 13px; border-radius: 12px;
      background: linear-gradient(135deg, #f5c518, #e6b800);
      color: #000; font-size: 0.95rem; font-weight: 800;
      border: none; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      min-height: 48px;
    }
    .btn-keep:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,197,24,0.4); }
    .btn-keep:active { transform: translateY(0); }
    .btn-release {
      flex: 1; padding: 13px; border-radius: 12px;
      background: transparent;
      border: 1.5px solid #2e2e2e;
      color: #888; font-size: 0.95rem; font-weight: 700;
      cursor: pointer;
      transition: border-color .15s, color .15s, transform .15s;
      min-height: 48px;
    }
    .btn-release:hover { border-color: #4caf50; color: #4caf50; transform: translateY(-2px); }
    .btn-release:active { transform: translateY(0); }

    .btn-again {
      width: 100%; padding: 11px;
      border-radius: 12px;
      background: transparent; border: 1.5px solid #252525;
      color: #555; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: border-color .15s, color .15s;
      min-height: 44px;
    }
    .btn-again:hover { border-color: #e53935; color: #e53935; }

    /* ══ 결과 토스트 ══ */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 50px; padding: 10px 22px;
      font-size: 0.88rem; font-weight: 600; color: #f0f0f0;
      transition: transform .35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 500; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ══ 컬렉션 섹션 ══ */
    .collection-section {
      width: 100%; max-width: 520px;
      margin-top: 12px;
    }
    .collection-toggle {
      width: 100%; padding: 11px 16px;
      background: transparent; border: 1px solid #1e1e1e;
      border-radius: 12px; color: #555;
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color .15s, color .15s;
      min-height: 44px;
    }
    .collection-toggle:hover { border-color: #333; color: #aaa; }
    .collection-toggle .coll-count {
      background: #1e1e1e; border-radius: 20px;
      padding: 2px 10px; font-size: 0.75rem; color: #888;
    }
    .collection-grid {
      display: none;
      flex-wrap: wrap; gap: 8px;
      margin-top: 12px;
    }
    .collection-grid.open { display: flex; }
    .coll-chip {
      display: flex; align-items: center; gap: 8px;
      background: #111; border: 1px solid #222;
      border-radius: 10px; padding: 6px 10px 6px 6px;
      font-size: 0.8rem; color: #ccc;
      cursor: default;
      transition: border-color .15s;
    }
    .coll-chip:hover { border-color: #333; }
    .coll-chip img { width: 32px; height: 32px; object-fit: contain; image-rendering: auto; }
    .coll-chip .coll-name { font-weight: 600; }
    .coll-chip .coll-date { font-size: 0.7rem; color: #444; display: block; }
    .coll-empty { color: #444; font-size: 0.82rem; padding: 16px 0; text-align: center; width: 100%; }
    .btn-coll-clear {
      margin-top: 10px; padding: 7px 14px;
      background: transparent; border: 1px solid #252525;
      border-radius: 8px; color: #444; font-size: 0.75rem;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .btn-coll-clear:hover { border-color: #e53935; color: #e53935; }
  </style>
</head>
<body>

<!-- ══ 헤더 ══ -->
<div class="site-header-bar">
  <div class="site-header-inner">
    <a class="site-logo" href="index.html">
      <div class="logo-ball"></div>
      <span class="logo-text">Poké<span>nova</span></span>
    </a>
    <button class="hamburger-btn" id="hamburger-btn" onclick="toggleMobileNav()" aria-label="메뉴">☰</button>
    <nav class="site-nav" id="site-nav">
      <a href="index.html"   class="site-nav-btn">🎴 퀴즈</a>
      <a href="pokedex.html" class="site-nav-btn">📖 포켓몬 도감</a>
      <a href="movedex.html" class="site-nav-btn">⚔️ 기술 도감</a>
      <a href="itemdex.html" class="site-nav-btn">🎒 아이템 도감</a>
      <a href="entry.html"   class="site-nav-btn">🏆 배틀팀</a>
      <a href="record.html"  class="site-nav-btn">📊 기록</a>
      <a href="today.html"   class="site-nav-btn active">🎱 오늘의 포켓몬</a>
    </nav>
  </div>
</div>

<!-- ══ 메인 ══ -->
<div class="page-title">🎱 오늘의 <span>포켓몬</span></div>
<div class="page-sub">몬스터볼을 눌러 포켓몬을 만나보세요</div>

<div class="gacha-wrap">

  <!-- 비디오 스테이지 -->
  <div class="video-stage" id="video-stage" onclick="onStageClick()">
    <video id="pokeball-video" muted playsinline preload="metadata"
           poster="" onended="onVideoEnded()">
      <source src="videos/pokeball-open.mp4" type="video/mp4">
    </video>
    <!-- 비디오 없을 때 폴백 -->
    <div class="video-fallback" id="video-fallback" style="display:none">
      <div style="font-size:5rem;animation:floatBall 2.4s ease-in-out infinite">⚾</div>
    </div>
    <!-- 클릭 힌트 오버레이 -->
    <div class="click-hint" id="click-hint">
      <div class="click-hint-ball"></div>
      <div class="click-hint-text">👆 눌러서 포켓몬 뽑기</div>
    </div>
  </div>

  <!-- 포켓몬 카드 -->
  <div class="pokemon-card" id="pokemon-card">
    <div class="pokemon-number" id="poke-number">#0000</div>
    <div class="pokemon-sprite-wrap">
      <img class="pokemon-sprite" id="poke-sprite" src="" alt="" />
    </div>
    <div class="pokemon-name" id="poke-name">—</div>
    <div class="pokemon-name-en" id="poke-name-en">—</div>
    <div class="types-wrap" id="poke-types"></div>
    <div class="flavor-box" id="poke-flavor">
      <span class="flavor-loading">설명을 불러오는 중...</span>
    </div>
    <div class="action-btns">
      <button class="btn-keep"    onclick="keepPokemon()">🎒 보관하기</button>
      <button class="btn-release" onclick="releasePokemon()">🌿 놓아주기</button>
    </div>
    <button class="btn-again" id="btn-again" onclick="drawAgain()" style="display:none">
      🎲 다시 뽑기
    </button>
  </div>

  <!-- 컬렉션 -->
  <div class="collection-section">
    <button class="collection-toggle" onclick="toggleCollection()">
      <span>🗂️ 내 컬렉션</span>
      <span class="coll-count" id="coll-count">0마리</span>
    </button>
    <div class="collection-grid" id="collection-grid"></div>
  </div>

</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ══ 모바일 nav ══ */
function toggleMobileNav() {
  document.getElementById('site-nav').classList.toggle('open');
}
document.addEventListener('click', e => {
  const nav = document.getElementById('site-nav');
  const btn = document.getElementById('hamburger-btn');
  if (nav.classList.contains('open') && !nav.contains(e.target) && e.target !== btn) {
    nav.classList.remove('open');
  }
});

/* ══ 타입 색상 ══ */
const TYPE_COLOR = {
  노말:'#9099A1',불꽃:'#F08030',물:'#6890F0',전기:'#F8D030',
  풀:'#78C850',얼음:'#98D8D8',격투:'#C03028',독:'#A040A0',
  땅:'#E0C068',비행:'#A890F0',에스퍼:'#F85888',벌레:'#A8B820',
  바위:'#B8A038',고스트:'#705898',드래곤:'#7038F8',악:'#705848',
  강철:'#B8B8D0',페어리:'#EE99AC'
};

/* ══ 상태 ══ */
let pokemonDB = [];
let currentPokemon = null;
let videoOk = true;
let revealed = false;

/* ══ 데이터 로드 ══ */
async function loadData() {
  try {
    pokemonDB = await fetch('data/quiz_pokemon.json').then(r => r.json());
    // 기본 포켓몬만 (forms 제외)
    pokemonDB = pokemonDB.filter(p => p.id && p.id <= 1025);
  } catch(e) {
    console.warn('데이터 로드 실패', e);
  }
}

/* ══ 비디오 상태 확인 ══ */
const video = document.getElementById('pokeball-video');
video.addEventListener('error', () => {
  videoOk = false;
  document.getElementById('video-fallback').style.display = '';
  video.style.display = 'none';
});
// 비디오 소스가 없으면 폴백
video.addEventListener('loadstart', () => {});
setTimeout(() => {
  if (video.networkState === HTMLMediaElement.NETWORK_NO_SOURCE || video.readyState === 0) {
    // 비디오 파일 아직 없을 수 있음 — 로드 후 판단
  }
}, 1000);

/* ══ 스테이지 클릭 ══ */
function onStageClick() {
  if (revealed) return; // 이미 공개된 경우 무시
  const hint = document.getElementById('click-hint');
  hint.classList.add('hidden');
  if (videoOk && video.src && !video.src.endsWith('/today.html')) {
    video.currentTime = 0;
    video.play().then(() => {
      // 재생 시작됨 — onVideoEnded 에서 처리
    }).catch(() => {
      // 재생 실패 시 바로 공개
      revealPokemon();
    });
  } else {
    // 비디오 없음 — 바로 공개
    revealPokemon();
  }
}

function onVideoEnded() {
  revealPokemon();
}

/* ══ 랜덤 포켓몬 선택 ══ */
function pickRandom() {
  if (!pokemonDB.length) return null;
  return pokemonDB[Math.floor(Math.random() * pokemonDB.length)];
}

/* ══ 포켓몬 공개 ══ */
async function revealPokemon() {
  revealed = true;
  const p = pickRandom();
  if (!p) return;
  currentPokemon = p;

  // 카드 채우기
  document.getElementById('poke-number').textContent = `#${String(p.id).padStart(4,'0')}`;
  document.getElementById('poke-sprite').src = p.sprite;
  document.getElementById('poke-sprite').alt = p.ko;
  document.getElementById('poke-name').textContent = p.ko;
  document.getElementById('poke-name-en').textContent = p.en;

  // 타입 뱃지
  const typesEl = document.getElementById('poke-types');
  typesEl.innerHTML = (p.types || []).map(t =>
    `<span class="type-badge" style="background:${TYPE_COLOR[t]||'#555'}">${t}</span>`
  ).join('');

  // 플레이버 텍스트 초기화
  document.getElementById('poke-flavor').innerHTML = '<span class="flavor-loading">설명을 불러오는 중...</span>';

  // 카드 표시
  const card = document.getElementById('pokemon-card');
  card.classList.add('visible');

  // 플레이버 텍스트 비동기 로드
  loadFlavorText(p.id);
}

/* ══ PokeAPI 플레이버 텍스트 ══ */
async function loadFlavorText(id) {
  const el = document.getElementById('poke-flavor');
  try {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}/`);
    const data = await res.json();
    const entries = data.flavor_text_entries || [];
    // 한국어 우선, 없으면 영어
    const ko = entries.find(e => e.language.name === 'ko');
    const en = entries.find(e => e.language.name === 'en');
    const text = (ko || en);
    if (text) {
      el.textContent = text.flavor_text.replace(/\f/g, ' ').replace(/\u00ad/g, '');
    } else {
      el.textContent = '설명 정보가 없어요.';
    }
  } catch(e) {
    el.textContent = '설명을 불러오지 못했어요.';
  }
}

/* ══ 보관하기 ══ */
function keepPokemon() {
  if (!currentPokemon) return;
  const p = currentPokemon;
  const coll = getCollection();
  // 중복 체크 안함 (여러 마리 보관 가능)
  const now = new Date();
  const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
  coll.unshift({ id: p.id, ko: p.ko, en: p.en, sprite: p.sprite, types: p.types, caughtAt: dateStr });
  if (coll.length > 200) coll.length = 200;
  localStorage.setItem('pokenova_collection', JSON.stringify(coll));
  showToast(`🎉 ${p.ko}을(를) 보관했어요!`);
  afterAction();
  renderCollection();
}

/* ══ 놓아주기 ══ */
function releasePokemon() {
  if (!currentPokemon) return;
  showToast(`🌿 ${currentPokemon.ko}을(를) 놓아줬어요. 잘 가~`);
  afterAction();
}

/* ══ 액션 후 처리 ══ */
function afterAction() {
  // 보관/놓아주기 버튼 숨기고 다시뽑기 버튼 표시
  document.querySelectorAll('.btn-keep, .btn-release').forEach(b => b.style.display = 'none');
  document.getElementById('btn-again').style.display = '';
}

/* ══ 다시 뽑기 ══ */
function drawAgain() {
  revealed = false;
  currentPokemon = null;
  // 버튼 리셋
  document.querySelectorAll('.btn-keep, .btn-release').forEach(b => b.style.display = '');
  document.getElementById('btn-again').style.display = 'none';
  // 카드 숨기기
  document.getElementById('pokemon-card').classList.remove('visible');
  // 힌트 오버레이 다시
  const hint = document.getElementById('click-hint');
  hint.classList.remove('hidden');
  // 비디오 리셋
  if (videoOk) {
    video.currentTime = 0;
    video.pause();
  }
}

/* ══ 토스트 ══ */
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ══ 컬렉션 ══ */
function getCollection() {
  try { return JSON.parse(localStorage.getItem('pokenova_collection') || '[]'); }
  catch(e) { return []; }
}

function toggleCollection() {
  const grid = document.getElementById('collection-grid');
  grid.classList.toggle('open');
  if (grid.classList.contains('open')) renderCollection();
}

function renderCollection() {
  const coll = getCollection();
  const grid = document.getElementById('collection-grid');
  document.getElementById('coll-count').textContent = `${coll.length}마리`;
  if (!coll.length) {
    grid.innerHTML = '<div class="coll-empty">아직 보관한 포켓몬이 없어요</div>';
    return;
  }
  grid.innerHTML = coll.map(p => `
    <div class="coll-chip">
      <img src="${p.sprite}" alt="${p.ko}" onerror="this.src='sprites/pokemon/master__sprites__pokemon__other__official-artwork__1.png'">
      <div>
        <div class="coll-name">${p.ko}</div>
        <span class="coll-date">${p.caughtAt}</span>
      </div>
    </div>
  `).join('');
  // 전체 비우기 버튼
  if (!grid.querySelector('.btn-coll-clear')) {
    const clrBtn = document.createElement('button');
    clrBtn.className = 'btn-coll-clear';
    clrBtn.textContent = '🗑️ 컬렉션 비우기';
    clrBtn.onclick = clearCollection;
    grid.appendChild(clrBtn);
  }
}

function clearCollection() {
  if (!confirm('컬렉션을 전부 비우시겠어요?')) return;
  localStorage.removeItem('pokenova_collection');
  renderCollection();
  showToast('컬렉션을 비웠어요');
}

/* ══ 초기화 ══ */
(async () => {
  await loadData();
  renderCollection();
  document.getElementById('coll-count').textContent = `${getCollection().length}마리`;
})();
</script>

</body>
</html>
