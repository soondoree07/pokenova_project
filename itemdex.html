<style>
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* ── 헤더 ── */
.site-header{padding:0 24px;background:#141414;border-bottom:1px solid #252525;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:16px}
.site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-ball{width:28px;height:28px;background:#f0f0f0;border-radius:50%;position:relative;overflow:hidden;border:2.5px solid #555;flex-shrink:0}
.logo-ball::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:#e53935}
.logo-ball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:9px;height:9px;background:#f0f0f0;border-radius:50%;border:2px solid #555;z-index:1}
.logo-text{color:#f0f0f0;font-size:18px;font-weight:900;letter-spacing:-.5px}
.logo-text span{color:#e53935}
.site-nav{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.site-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:9px;background:#1e1e1e;color:#bbb;font-size:0.82rem;font-weight:600;text-decoration:none;white-space:nowrap;border:1.5px solid #333;transition:background .15s,color .15s,border-color .15s}
.site-nav-btn:hover{background:#2a2a2a;color:#fff;border-color:#555}
.site-nav-btn.active{background:#e53935;color:#fff;border-color:#e53935}

/* ── 컨테이너 ── */
.container{max-width:1200px;margin:0 auto;padding:20px}
h1{font-size:1.3rem;font-weight:700;margin-bottom:18px;color:#fff}

/* ── 필터 바 ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#f0f0f0;font-size:0.9rem;outline:none}
.search-wrap input:focus{border-color:#e53935}
.search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:.85rem;opacity:.5}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 11px;border-radius:20px;background:#1e1e1e;border:1.5px solid #333;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;color:#fff}
.chip:hover{border-color:#888}
.chip.active{background:#e53935;border-color:#e53935;color:#fff}
.count-label{font-size:0.8rem;color:#888;margin-left:auto;align-self:center}

/* ── 아이템 그리드 ── */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

/* ── 아이템 카드 ── */
.item-card{background:#141414;border:1px solid #252525;border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s;cursor:default}
.item-card:hover{border-color:#444}
.item-sprite{width:48px;height:48px;object-fit:contain;flex-shrink:0;image-rendering:auto}
.item-sprite-placeholder{width:48px;height:48px;flex-shrink:0;background:#1e1e1e;border-radius:6px}
.item-body{flex:1;min-width:0}
.item-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.item-name-ko{font-size:0.98rem;font-weight:700;color:#f0f0f0}
.item-cat-badge{font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.item-desc{font-size:0.8rem;color:#aaa;line-height:1.5}

/* ── 카테고리 배지 색상 ── */
.cat-지닌도구{background:#1565c0;color:#fff}
.cat-열매{background:#388e3c;color:#fff}
.cat-메가스톤{background:#6a1b9a;color:#fff}
.cat-전용도구{background:#bf360c;color:#fff}
.cat-볼{background:#00838f;color:#fff}
.cat-기타{background:#546e7a;color:#fff}

/* ── 햄버거 메뉴 ── */
.hamburger-btn{display:none;flex-shrink:0;background:none;border:1.5px solid #333;border-radius:8px;cursor:pointer;padding:5px 10px;color:#bbb;font-size:20px;line-height:1;transition:border-color .15s,color .15s}
.hamburger-btn:hover{border-color:#555;color:#fff}

/* ── 반응형 ── */
@media(max-width:600px){
  .site-header{padding:0 12px}
  .header-inner{height:52px;gap:8px}
  .logo-text{font-size:15px}
  .hamburger-btn{display:flex;align-items:center;justify-content:center}
  .site-nav{display:none;position:absolute;top:100%;left:0;right:0;background:#141414;border-bottom:1px solid #252525;flex-direction:column;padding:10px 16px 16px;gap:6px;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .site-nav.open{display:flex}
  .site-nav-btn{width:100%;padding:11px 16px;font-size:0.9rem;border-radius:10px;justify-content:flex-start}
  .container{padding:14px 12px}
  h1{font-size:1.1rem;margin-bottom:14px}
  .filter-bar{gap:6px;margin-bottom:10px}
  .search-wrap{min-width:0;max-width:100%}
  .search-wrap input{font-size:1rem;min-height:44px;padding:10px 12px 10px 32px}
  .chip{padding:7px 10px;min-height:38px;font-size:0.8rem}
  .count-label{font-size:0.75rem}
  .item-grid{grid-template-columns:1fr}
}
@media(max-width:380px){
  .site-nav-btn{padding:4px 6px;font-size:0.7rem}
  .chip{padding:6px 8px;font-size:0.75rem}
}
.site-footer{width:100%;max-width:700px;margin:60px auto 0;padding:24px 16px 8px;border-top:1px solid #252525;text-align:center;color:#555;font-size:0.78rem;line-height:1.9}
.site-footer a{color:#777;text-decoration:none;transition:color .2s}
.site-footer a:hover{color:#e53935}
.site-footer .footer-name{color:#888;font-weight:600}

/* ── 오류 신고 ── */
.btn-report-page{padding:7px 14px;border-radius:9px;border:1.5px solid #333;background:#1e1e1e;color:#bbb;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-report-page:hover{border-color:#ff9800;color:#ff9800}
.report-type-btn{padding:8px 14px;border-radius:8px;border:1.5px solid #252525;background:transparent;color:#888;font-size:0.82rem;cursor:pointer;transition:all .15s}
.report-type-btn:hover{border-color:#ff9800;color:#ff9800}
.report-type-btn.selected{border-color:#ff9800;background:rgba(255,152,0,.1);color:#ff9800}
.report-item-search{width:100%;padding:9px 12px;background:#0f0f0f;border:1.5px solid #252525;border-radius:10px;color:#f0f0f0;font-size:0.9rem;outline:none;font-family:inherit}
.report-item-search:focus{border-color:#ff9800}
.report-item-list{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-top:4px}
.report-item-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.report-item-row:hover{background:#1e1e1e;border-color:#333}
.report-item-row.selected{background:rgba(255,152,0,.08);border-color:#ff9800}
.report-item-row img{width:32px;height:32px;object-fit:contain;image-rendering:auto}
.report-item-row-name{font-size:0.88rem;font-weight:600;color:#f0f0f0}
.report-item-row-cat{font-size:0.72rem;color:#666}
</style>

<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px">
    <h1 style="margin-bottom:0">아이템 도감</h1>

  </div>

  <div class="filter-bar">
    <div class="search-wrap">
      <input id="search" type="text" placeholder="아이템명 검색..." oninput="render()" autocomplete="off" spellcheck="false">
    </div>
    <div class="filter-chips" id="tab-chips"></div>
    <button id="champions-btn" onclick="toggleChampions()" style="padding:6px 12px;border-radius:20px;border:1.5px solid #f5c518;background:transparent;color:#f5c518;font-size:0.8rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s">⚔️ 포챔스</button>
    <span class="count-label" id="count-label"></span>
  </div>

  <div class="item-grid" id="item-grid"></div>
</div>

<script>
function toggleMobileNav() {
  const nav = document.querySelector('.site-nav');
  const btn = document.getElementById('hamburger-btn');
  const isOpen = nav.classList.toggle('open');
  btn.textContent = isOpen ? '✕' : '☰';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.site-header')) {
    const nav = document.querySelector('.site-nav');
    const btn = document.getElementById('hamburger-btn');
    if (nav && nav.classList.contains('open')) {
      nav.classList.remove('open');
      if (btn) btn.textContent = '☰';
    }
  }
});

let allItems = [];
let activeTab = '전체';
let championsOnly = false;

// ── 탭 정의 ──
const TABS = ['전체','지닌도구','열매','메가스톤','전용도구','볼','기타'];

// 탭별 카테고리 집합
const TAB_CATS = {
  '지닌도구': new Set(['held-items','type-enhancement','type-protection','jewels','choice',
    'bad-held-items','in-a-pinch']),
  '메가스톤': new Set(['mega-stones']),
  '전용도구': new Set(['plates','memories','species-specific','z-crystals']),
  '볼':      new Set(['standard-balls','special-balls','apricorn-balls']),
  '기타':    new Set(['scarves','stat-boosts','effort-training','effort-drop','training','flutes','pp-recovery',
    'spelunking','healing','medicine','picky-healing','revival',
    'status-cures','vitamins','fossil','for-sell','other','evolution']),
};

// 아이템이 속하는 탭 반환 (열매 우선)
function getItemTab(item) {
  if ((item.ko || '').includes('열매')) return '열매';
  for (const [tab, cats] of Object.entries(TAB_CATS)) {
    if (cats.has(item.category)) return tab;
  }
  return '기타';
}

// 카테고리 → 한국어 세부 이름
const CAT_KO = {
  'held-items':       '지닌도구',
  'type-enhancement': '타입 강화',
  'type-protection':  '타입 방어',
  'jewels':           '주얼',
  'scarves':          '스카프',
  'choice':           '기술선택',
  'bad-held-items':   '디버프 도구',
  'stat-boosts':      '능력치 강화',
  'effort-training':  '노력치 훈련',
  'effort-drop':      '노력치 감소',
  'training':         '훈련',
  'flutes':           '피리',
  'pp-recovery':      'PP 회복',
  'in-a-pinch':       '핀치 도구',
  'mega-stones':      '메가스톤',
  'plates':           '플레이트',
  'memories':         '메모리',
  'species-specific': '전용도구',
  'z-crystals':       'Z크리스탈',
  'standard-balls':   '볼',
  'special-balls':    '특수볼',
  'apricorn-balls':   '규토리볼',
  'scarves':          '밴드',
  'stat-boosts':      '능력치 강화',
  'effort-training':  '노력치 훈련',
  'effort-drop':      '노력치 감소',
  'training':         '훈련',
  'flutes':           '비드로',
  'pp-recovery':      'PP 회복',
  'spelunking':       '탐험',
  'healing':          '회복',
  'medicine':         '의약품',
  'picky-healing':    '회복',
  'revival':          '부활',
  'status-cures':     '상태이상 치료',
  'vitamins':         '비타민',
  'fossil':           '화석',
  'for-sell':         '판매용',
  'other':            '기타',
  'evolution':        '진화 아이템',
};

// 메가스톤 게임 등장 순서 (en 기준)
// 1 = XY (2013), 2 = ORAS (2014), 3 = 커스텀/비공식
const MEGA_GEN = {
  // XY
  'venusaurite':1,'charizardite x':1,'charizardite y':1,'blastoisinite':1,
  'alakazite':1,'gengarite':1,'kangaskhanite':1,'pinsirite':1,
  'gyaradosite':1,'aerodactylite':1,'mewtwonite x':1,'mewtwonite y':1,
  'ampharosite':1,'scizorite':1,'heracronite':1,'banettite':1,
  'tyranitarite':1,'absolite':1,'mawilite':1,'medichamite':1,
  'manectite':1,'houndoominite':1,'abomasite':1,'garchompite':1,'lucarionite':1,
  // ORAS
  'sceptilite':2,'swampertite':2,'blazikenite':2,'sablenite':2,'altarianite':2,
  'galladite':2,'audinite':2,'metagrossite':2,'sharpedonite':2,'slowbronite':2,
  'steelixite':2,'pidgeotite':2,'glalitite':2,'diancite':2,'cameruptite':2,
  'lopunnite':2,'salamencite':2,'beedrillite':2,'latiasite':2,'latiosite':2,
  'aggronite':2,'blue orb':2,'red orb':2,
};

function megaGenOrder(item) {
  return MEGA_GEN[item.en] || 3;
}

const POCHAMS_API = 'https://pochams.com';
const CACHE_TTL = 6 * 60 * 60 * 1000;
function getCached(key) {
  try { const {ts,data}=JSON.parse(localStorage.getItem(key)); if(Date.now()-ts<CACHE_TTL)return data; } catch(e){}
  return null;
}
function setCache(key,data) {
  try { localStorage.setItem(key,JSON.stringify({ts:Date.now(),data})); } catch(e){}
}
async function fetchWithCache(url, key) {
  const c = getCached(key); if(c) return c;
  const data = await fetch(url).then(r=>r.json());
  setCache(key, data); return data;
}

async function init() {
  try {
    const raw = await fetchWithCache(POCHAMS_API + '/api/data/items', 'pkdex_items_v2');
    allItems = raw.filter(it =>
      !it.needs_ko &&
      (it.desc_lang === 'ko' || it.desc_lang == null) &&
      it.category !== 'all-machines' &&
      !(it.category === 'jewels' && it.ko !== '노말주얼')
    );
    buildChips();
    render();
  } catch(e) {
    document.getElementById('item-grid').innerHTML =
      '<p style="color:#e53935;padding:20px">데이터를 불러올 수 없습니다. 새로고침 해주세요.</p>';
  }
}

function buildChips() {
  document.getElementById('tab-chips').innerHTML = TABS.map(t =>
    `<button class="chip${t === '전체' ? ' active' : ''}" onclick="setTab('${t}')">${t}</button>`
  ).join('');
}

function setTab(t) {
  activeTab = t;
  document.querySelectorAll('#tab-chips .chip').forEach(b =>
    b.classList.toggle('active', b.textContent === t)
  );
  render();
}

function toggleChampions() {
  championsOnly = !championsOnly;
  const btn = document.getElementById('champions-btn');
  btn.style.background = championsOnly ? '#f5c518' : 'transparent';
  btn.style.color = championsOnly ? '#000' : '#f5c518';
  render();
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();

  let list = allItems;
  if (championsOnly) {
    list = list.filter(it => it.in_champions);
  }
  if (activeTab !== '전체') {
    list = list.filter(it => getItemTab(it) === activeTab);
  }
  if (q) {
    list = list.filter(it =>
      (it.ko || '').toLowerCase().includes(q) ||
      (it.en || '').toLowerCase().includes(q)
    );
  }

  // 메가스톤 탭: 게임 등장 순서 → 가나다 순
  if (activeTab === '메가스톤') {
    list = [...list].sort((a, b) => {
      const ga = megaGenOrder(a), gb = megaGenOrder(b);
      if (ga !== gb) return ga - gb;
      return (a.ko || '').localeCompare(b.ko || '', 'ko');
    });
  }

  document.getElementById('count-label').textContent = `${list.length}개`;
  document.getElementById('item-grid').innerHTML = list.map(buildItemCard).join('');
}

function buildItemCard(it) {
  const tab    = getItemTab(it);
  const catKo  = (it.ko || '').includes('열매') ? '열매' : (CAT_KO[it.category] || it.category);
  const sprite = it.sprite
    ? `<img class="item-sprite" src="${it.sprite}" alt="${it.ko}" onerror="this.style.opacity=0.2">`
    : `<div class="item-sprite-placeholder"></div>`;
  return `
  <div class="item-card">
    ${sprite}
    <div class="item-body">
      <div class="item-head">
        <span class="item-name-ko">${it.ko || ''}</span>
        <span class="item-cat-badge cat-${tab}">${catKo}</span>
      </div>
      <div class="item-desc">${it.desc || ''}</div>
    </div>
  </div>`;
}

init();

/* ── 오류 신고 ── */
let _reportKo = '', _reportEn = '', _reportType = '', _selectedItem = null;

function openReportModal() {
  _selectedItem = null; _reportType = '';
  document.getElementById('report-item-search').value = '';
  renderReportItemList('');
  document.getElementById('report-step1').style.display = '';
  document.getElementById('report-step2').style.display = 'none';
  document.getElementById('report-modal').style.display = 'flex';
}
function closeReportModal() { document.getElementById('report-modal').style.display = 'none'; }

function renderReportItemList(q) {
  const filtered = q
    ? allItems.filter(it => (it.ko||'').toLowerCase().includes(q) || (it.en||'').toLowerCase().includes(q))
    : allItems.slice(0, 80);
  const el = document.getElementById('report-item-list');
  if (!filtered.length) { el.innerHTML = '<div style="color:#555;font-size:0.82rem;padding:8px">검색 결과 없음</div>'; return; }
  el.innerHTML = filtered.slice(0, 80).map(it => {
    const tab = getItemTab(it);
    const sprite = it.sprite ? `<img src="${it.sprite}" alt="" onerror="this.style.opacity=0.2">` : '<div style="width:32px;height:32px"></div>';
    const koEsc = (it.ko||'').replace(/'/g,"\\'");
    const enEsc = (it.en||'').replace(/'/g,"\\'");
    return `<div class="report-item-row" onclick="selectReportItem(this,'${koEsc}','${enEsc}','${tab}')">
      ${sprite}
      <div>
        <div class="report-item-row-name">${it.ko||''}</div>
        <div class="report-item-row-cat">${it.en||''} · ${tab}</div>
      </div>
    </div>`;
  }).join('');
}

function selectReportItem(el, ko, en, tab) {
  _selectedItem = { ko, en };
  document.getElementById('report-step1').style.display = 'none';
  document.getElementById('report-selected-name').textContent = `${ko}${en ? ' / ' + en : ''}`;
  _reportType = '';
  document.querySelectorAll('.report-type-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('report-memo').value = '';
  document.getElementById('report-submit-btn').disabled = true;
  document.getElementById('report-submit-btn').style.opacity = '0.5';
  document.getElementById('report-step2').style.display = 'flex';
}

function goBackToSearch() {
  document.getElementById('report-step2').style.display = 'none';
  document.getElementById('report-step1').style.display = '';
}

function selectReportType(btn, type) {
  _reportType = type;
  document.querySelectorAll('.report-type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('report-submit-btn').disabled = false;
  document.getElementById('report-submit-btn').style.opacity = '1';
}

function submitReport() {
  if (!_selectedItem) return;
  const report = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    mode: 'itemdex', modeLabel: '아이템 도감',
    ko: _selectedItem.ko, en: _selectedItem.en,
    type: _reportType, memo: document.getElementById('report-memo').value.trim(),
    ts: Date.now(), resolved: false
  };
  const arr = JSON.parse(localStorage.getItem('pq_reports') || '[]');
  arr.unshift(report);
  if (arr.length > 500) arr.length = 500;
  localStorage.setItem('pq_reports', JSON.stringify(arr));
  closeReportModal();
}
</script>

<!-- 오류 신고 모달 -->
<div id="report-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(6px)" onclick="if(event.target===this)closeReportModal()">
  <div style="background:#141414;border:1px solid #252525;border-radius:20px;padding:28px;width:90%;max-width:420px;display:flex;flex-direction:column;gap:16px">
    <div style="font-size:1.1rem;font-weight:900;color:#ff9800">⚠️ 오류 신고</div>

    <!-- 1단계: 아이템 검색 -->
    <div id="report-step1">
      <div style="font-size:0.7rem;color:#555;letter-spacing:1px;margin-bottom:8px">신고할 아이템을 검색하세요</div>
      <input class="report-item-search" id="report-item-search" type="text" placeholder="아이템명 검색..." autocomplete="off"
        oninput="renderReportItemList(this.value.trim().toLowerCase())">
      <div class="report-item-list" id="report-item-list"></div>
      <button onclick="closeReportModal()" style="margin-top:14px;width:100%;padding:11px;border-radius:12px;border:1.5px solid #252525;background:transparent;color:#888;cursor:pointer;font-family:inherit">취소</button>
    </div>

    <!-- 2단계: 신고 유형 선택 -->
    <div id="report-step2" style="display:none;flex-direction:column;gap:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="goBackToSearch()" style="background:none;border:none;color:#888;cursor:pointer;font-size:1.1rem;padding:0;line-height:1">←</button>
        <div style="font-size:0.85rem;color:#aaa" id="report-selected-name"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="font-size:0.7rem;color:#555;letter-spacing:1px">신고 유형</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="report-type-btn" onclick="selectReportType(this,'정보 오류')">정보 오류</button>
          <button class="report-type-btn" onclick="selectReportType(this,'이미지 오류')">이미지 오류</button>
          <button class="report-type-btn" onclick="selectReportType(this,'기타')">기타</button>
        </div>
        <div style="font-size:0.7rem;color:#555;letter-spacing:1px;margin-top:2px">메모 (선택)</div>
        <textarea id="report-memo" rows="3" placeholder="자세한 내용을 입력해주세요..." style="background:#0f0f0f;border:1.5px solid #252525;border-radius:10px;color:#f0f0f0;font-size:0.88rem;padding:10px 14px;resize:none;outline:none;width:100%;font-family:inherit"></textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="closeReportModal()" style="flex:1;padding:11px;border-radius:12px;border:1.5px solid #252525;background:transparent;color:#888;cursor:pointer;font-family:inherit">취소</button>
        <button id="report-submit-btn" onclick="submitReport()" disabled style="flex:1;padding:11px;border-radius:12px;border:none;background:#ff9800;color:#fff;font-weight:700;cursor:pointer;opacity:0.5;font-family:inherit">신고하기</button>
      </div>
    </div>
  </div>
</div>
