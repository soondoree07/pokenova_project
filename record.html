<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokénova — 내 기록</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow-x: hidden; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 48px;
      overflow-x: hidden;
    }

    /* ══ 헤더 ══ */
    .site-header-bar {
      position: sticky; top: 0;
      background: #141414;
      border-bottom: 1px solid #252525;
      padding: 0 24px;
      z-index: 100;
      width: calc(100% + 32px);
      margin-left: -16px;
    }
    .site-header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; gap: 16px;
    }
    .site-logo { display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0; }
    .logo-ball {
      width:28px; height:28px; background:#f0f0f0;
      border-radius:50%; position:relative; overflow:hidden;
      border:2.5px solid #555; flex-shrink:0;
    }
    .logo-ball::before { content:''; position:absolute; top:0;left:0;right:0; height:50%; background:#e53935; }
    .logo-ball::after {
      content:''; position:absolute; top:50%;left:50%;
      transform:translate(-50%,-50%); width:9px;height:9px;
      background:#f0f0f0; border-radius:50%; border:2px solid #555; z-index:1;
    }
    .logo-text { color:#f0f0f0; font-size:18px; font-weight:900; letter-spacing:-0.5px; }
    .logo-text span { color:#e53935; }

    .site-nav { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
    .site-nav-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 9px;
      background: #1e1e1e; color: #bbb;
      font-size: 0.82rem; font-weight: 600;
      text-decoration: none; white-space: nowrap;
      border: 1.5px solid #333;
      transition: background .15s, color .15s, border-color .15s;
    }
    .site-nav-btn:hover { background: #2a2a2a; color: #fff; border-color: #555; }
    .site-nav-btn.active { background: #e53935; color: #fff; border-color: #e53935; }

    /* ══ 햄버거 ══ */
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; }
    .hamburger span { width:22px; height:2px; background:#ccc; border-radius:2px; transition:all .3s; }

    /* ══ 본문 ══ */
    .page-wrap {
      width: 100%;
      max-width: 520px;
      margin-top: 36px;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 24px;
    }
    .page-title span { color: #e53935; }

    /* ══ 최고 기록 ══ */
    .best-section { margin-bottom: 36px; display: flex; flex-direction: column; gap: 10px; }

    /* 난이도별 카드 (포켓몬/기술) */
    .best-card-wide {
      background: #141414;
      border: 1px solid #252525;
      border-radius: 16px;
      padding: 18px 20px;
    }
    .best-card-wide-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #888;
      margin-bottom: 14px;
    }
    .best-diff-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .best-diff-cell {
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }
    .best-diff-name {
      font-size: 0.68rem;
      color: #555;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .best-diff-score {
      font-size: 1.5rem;
      font-weight: 900;
      color: #e53935;
      line-height: 1;
    }
    .best-diff-score span {
      font-size: 0.72rem;
      font-weight: 400;
      color: #444;
    }
    .best-diff-wrong {
      font-size: 0.68rem;
      color: #444;
      margin-top: 4px;
    }

    /* 단일 카드 그리드 (특성/도구) */
    .best-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .best-card {
      background: #141414;
      border: 1px solid #252525;
      border-radius: 16px;
      padding: 18px 16px;
    }
    .best-card-mode {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 6px;
    }
    .best-card-score {
      font-size: 1.8rem;
      font-weight: 900;
      color: #e53935;
      line-height: 1;
    }
    .best-card-score span {
      font-size: 0.85rem;
      font-weight: 400;
      color: #444;
    }
    .best-card-label {
      font-size: 0.72rem;
      color: #444;
      margin-top: 4px;
    }

    /* ══ 최근 기록 ══ */
    .section-title {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: #141414;
      border: 1px solid #252525;
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .history-mode-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-mode-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: #ccc;
    }
    .history-meta {
      font-size: 0.72rem;
      color: #555;
      margin-top: 3px;
    }
    .history-scores {
      text-align: right;
      flex-shrink: 0;
    }
    .history-correct {
      font-size: 1.1rem;
      font-weight: 900;
      color: #4caf50;
    }
    .history-wrong {
      font-size: 0.75rem;
      color: #e53935;
      margin-top: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #444;
      font-size: 0.88rem;
      line-height: 2;
    }
    .empty-state .empty-icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    .btn-clear {
      margin-top: 28px;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #444;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-clear:hover { border-color: #e53935; color: #e53935; }

    /* ══ 푸터 ══ */
    .site-footer {
      width: 100%;
      max-width: 700px;
      margin-top: 60px;
      padding: 24px 0 8px;
      border-top: 1px solid #252525;
      text-align: center;
      color: #555;
      font-size: 0.78rem;
      line-height: 1.9;
    }
    .site-footer .footer-name { color: #888; font-weight: 600; }

    /* ══ 모바일 ══ */
    @media (max-width: 600px) {
      .site-header-inner { height: 52px; }
      .site-nav-btn { padding: 5px 9px; font-size: 0.76rem; }
      .logo-text { font-size: 15px; }
      .site-nav {
        display: none;
        position: absolute;
        top: 52px; left: 0; right: 0;
        background: #141414;
        border-bottom: 1px solid #252525;
        flex-direction: column;
        padding: 12px 16px;
        gap: 6px;
        z-index: 99;
      }
      .site-nav.open { display: flex; }
      .site-nav-btn { width: 100%; padding: 11px 16px; font-size: 0.9rem; border-radius: 10px; justify-content: flex-start; }
      .hamburger { display: flex; }
      .best-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header-bar">
  <div class="site-header-inner">
    <a href="index.html" class="site-logo">
      <div class="logo-ball"></div>
      <span class="logo-text">Poké<span>nova</span></span>
    </a>
    <button class="hamburger" id="hamburger" onclick="toggleNav()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <a href="index.html"   class="site-nav-btn"><img src="sprites/items/master__sprites__items__poke-ball.png" style="width:24px;height:24px;vertical-align:middle;margin-right:3px;image-rendering:pixelated"> 퀴즈</a>
      <a href="pokedex.html" class="site-nav-btn"><img src="sprites/items/master__sprites__items__great-ball.png" style="width:24px;height:24px;vertical-align:middle;margin-right:3px;image-rendering:pixelated"> 포켓몬 도감</a>
      <a href="movedex.html"  class="site-nav-btn"><img src="sprites/items/master__sprites__items__ultra-ball.png" style="width:24px;height:24px;vertical-align:middle;margin-right:3px;image-rendering:pixelated"> 기술 도감</a>
      <a href="itemdex.html"  class="site-nav-btn"><img src="sprites/items/master__sprites__items__master-ball.png" style="width:24px;height:24px;vertical-align:middle;margin-right:3px;image-rendering:pixelated"> 아이템 도감</a>
      <a href="entry.html"    class="site-nav-btn"><img src="sprites/items/master__sprites__items__quick-ball.png" style="width:24px;height:24px;vertical-align:middle;margin-right:3px;image-rendering:pixelated"> 배틀팀</a>
      <a href="record.html"   class="site-nav-btn active"><img src="sprites/items/master__sprites__items__repeat-ball.png" style="width:24px;height:24px;vertical-align:middle;margin-right:3px;image-rendering:pixelated"> 기록</a>
      <a href="today.html"    class="site-nav-btn">오늘의 포켓몬</a>
    </nav>
  </div>
</header>

<div class="page-wrap">
  <div class="page-title">내 <span>기록</span></div>

  <!-- 최고 기록 -->
  <div class="section-title">최고 기록</div>
  <div class="best-section" id="best-section"></div>

  <!-- 최근 기록 -->
  <div class="section-title">최근 게임 기록</div>
  <div class="history-list" id="history-list"></div>

  <div id="btn-clear-wrap" style="display:none">
    <button class="btn-clear" onclick="clearAll()">기록 전체 삭제</button>
  </div>
</div>

<footer class="site-footer">
  <div>Made by <span class="footer-name">잉짱</span></div>
  <div style="margin-top:6px; font-size:0.72rem; color:#444;">
    Pokémon and all related names are trademarks of Nintendo / Game Freak / Creatures Inc.<br>
    This site is a fan-made project and is not affiliated with or endorsed by Nintendo.
  </div>
  <div style="margin-top:8px; font-size:0.72rem;">© 2026 Pokénova</div>
</footer>

<script>
function toggleNav() {
  document.getElementById('site-nav').classList.toggle('open');
}

const MODES = [
  { key: 'pokemon', label: '포켓몬 맞추기', icon: '🎴' },
  { key: 'move',    label: '기술 맞추기',   icon: '⚔️' },
  { key: 'ability', label: '특성 맞추기',   icon: '✨' },
  { key: 'item',    label: '도구 맞추기',   icon: '🎒' },
];

const DIFF_LABEL = { easy: '쉬움', normal: '보통', hard: '어려움', '-': '' };

function formatDate(ts) {
  const d = new Date(ts);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${d.getFullYear()}.${mm}.${dd} ${hh}:${mi}`;
}

function bestDiffCell(records, diff) {
  const filtered = records.filter(s => s.difficulty === diff);
  if (!filtered.length) return `
    <div class="best-diff-cell">
      <div class="best-diff-name">${DIFF_LABEL[diff]}</div>
      <div class="best-diff-score" style="color:#333">—</div>
      <div class="best-diff-wrong">기록 없음</div>
    </div>`;
  const best = filtered.reduce((a, b) => a.correct >= b.correct ? a : b);
  return `
    <div class="best-diff-cell">
      <div class="best-diff-name">${DIFF_LABEL[diff]}</div>
      <div class="best-diff-score">${best.correct}<span> 정답</span></div>
      <div class="best-diff-wrong">오답 ${best.wrong}</div>
    </div>`;
}

function render() {
  const sessions = JSON.parse(localStorage.getItem('pq_sessions') || '[]');

  // ── 최고 기록 ──
  const bestSection = document.getElementById('best-section');

  // 포켓몬/기술: 난이도별 카드
  const diffModes = [
    { key: 'pokemon', label: '포켓몬 맞추기', icon: '🎴' },
    { key: 'move',    label: '기술 맞추기',   icon: '⚔️' },
  ];
  const wideCards = diffModes.map(m => {
    const records = sessions.filter(s => s.mode === m.key);
    return `
      <div class="best-card-wide">
        <div class="best-card-wide-title">${m.icon} ${m.label}</div>
        <div class="best-diff-row">
          ${bestDiffCell(records, 'easy')}
          ${bestDiffCell(records, 'normal')}
          ${bestDiffCell(records, 'hard')}
        </div>
      </div>`;
  }).join('');

  // 특성/도구: 단일 카드 그리드
  const simpleModes = [
    { key: 'ability', label: '특성 맞추기', icon: '✨' },
    { key: 'item',    label: '도구 맞추기', icon: '🎒' },
  ];
  const simpleCards = simpleModes.map(m => {
    const records = sessions.filter(s => s.mode === m.key);
    if (!records.length) return `
      <div class="best-card">
        <div class="best-card-mode">${m.icon} ${m.label}</div>
        <div class="best-card-score" style="color:#333">—</div>
        <div class="best-card-label">기록 없음</div>
      </div>`;
    const best = records.reduce((a, b) => a.correct >= b.correct ? a : b);
    return `
      <div class="best-card">
        <div class="best-card-mode">${m.icon} ${m.label}</div>
        <div class="best-card-score">${best.correct}<span> 정답</span></div>
        <div class="best-card-label">오답 ${best.wrong}개</div>
      </div>`;
  }).join('');

  bestSection.innerHTML = wideCards + `<div class="best-grid">${simpleCards}</div>`;

  // ── 최근 기록 ──
  const historyList = document.getElementById('history-list');
  if (!sessions.length) {
    historyList.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">📭</span>
        아직 기록이 없어요.<br>퀴즈를 플레이하면 여기에 기록이 쌓여요!
      </div>`;
    document.getElementById('btn-clear-wrap').style.display = 'none';
    return;
  }

  document.getElementById('btn-clear-wrap').style.display = 'block';

  const modeMap = Object.fromEntries(MODES.map(m => [m.key, m]));
  historyList.innerHTML = sessions.slice(0, 50).map(s => {
    const m = modeMap[s.mode] || { label: s.modeLabel, icon: '🎮' };
    const diffText = s.difficulty && s.difficulty !== '-' ? ` · ${DIFF_LABEL[s.difficulty] || s.difficulty}` : '';
    return `
      <div class="history-item">
        <div class="history-mode-icon">${m.icon}</div>
        <div class="history-info">
          <div class="history-mode-label">${m.label}</div>
          <div class="history-meta">${formatDate(s.ts)}${diffText}</div>
        </div>
        <div class="history-scores">
          <div class="history-correct">${s.correct} 정답</div>
          <div class="history-wrong">오답 ${s.wrong}</div>
        </div>
      </div>`;
  }).join('');
}

function clearAll() {
  if (!confirm('기록을 전부 삭제할까요?')) return;
  localStorage.removeItem('pq_sessions');
  render();
}

render();
</script>
</body>
</html>
