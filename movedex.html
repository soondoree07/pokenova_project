<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>기술 도감 — Pokénova</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}

/* ── 헤더 ── */
.site-header{padding:0 24px;background:#141414;border-bottom:1px solid #252525;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:16px}
.site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-ball{width:28px;height:28px;background:#f0f0f0;border-radius:50%;position:relative;overflow:hidden;border:2.5px solid #555;flex-shrink:0}
.logo-ball::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:#e53935}
.logo-ball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:9px;height:9px;background:#f0f0f0;border-radius:50%;border:2px solid #555;z-index:1}
.logo-text{color:#f0f0f0;font-size:18px;font-weight:900;letter-spacing:-.5px}
.logo-text span{color:#e53935}
.site-nav{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.site-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:9px;background:#1e1e1e;color:#bbb;font-size:0.82rem;font-weight:600;text-decoration:none;white-space:nowrap;border:1.5px solid #333;transition:background .15s,color .15s,border-color .15s}
.site-nav-btn:hover{background:#2a2a2a;color:#fff;border-color:#555}
.site-nav-btn.active{background:#e53935;color:#fff;border-color:#e53935}

/* ── 컨테이너 ── */
.container{max-width:1200px;margin:0 auto;padding:20px}
h1{font-size:1.3rem;font-weight:700;margin-bottom:18px;color:#fff}

/* ── 필터 바 ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#f0f0f0;font-size:0.9rem;outline:none}
.search-wrap input:focus{border-color:#e53935}
.search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:.85rem;opacity:.5}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 11px;border-radius:20px;background:#1e1e1e;border:1.5px solid #333;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:#888}
.chip.active{color:#fff}
.count-label{font-size:0.8rem;color:#888;margin-left:auto;align-self:center}

/* ── 기술 그리드 ── */
.move-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.move-card{background:#141414;border:1px solid #252525;border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
.move-card:hover{border-color:#444}
.move-card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.move-name-ko{font-size:0.98rem;font-weight:700}
.move-name-en{font-size:0.75rem;color:#888}
.move-badges{display:flex;gap:5px;margin-left:auto;flex-shrink:0}
.badge-type{padding:2px 8px;border-radius:12px;font-size:0.72rem;font-weight:700}
.badge-class{padding:2px 8px;border-radius:12px;font-size:0.72rem;font-weight:700;background:#2a2a2a;border:1px solid #444}
.move-stats{display:flex;gap:12px;font-size:0.78rem;color:#aaa;margin-bottom:6px}
.move-stat span{color:#e0e0e0;font-weight:600}
.move-desc{font-size:0.8rem;color:#bbb;line-height:1.5}
.move-gen{font-size:0.72rem;color:#666;margin-top:4px}

/* ── 타입 색상 ── */
.t-노말{background:#9e9e9e;color:#fff}
.t-불꽃{background:#e53935;color:#fff}
.t-물{background:#1976d2;color:#fff}
.t-전기{background:#f9a825;color:#333}
.t-풀{background:#388e3c;color:#fff}
.t-얼음{background:#0097a7;color:#fff}
.t-격투{background:#bf360c;color:#fff}
.t-독{background:#7b1fa2;color:#fff}
.t-땅{background:#795548;color:#fff}
.t-비행{background:#5c6bc0;color:#fff}
.t-에스퍼{background:#e91e63;color:#fff}
.t-벌레{background:#558b2f;color:#fff}
.t-바위{background:#78909c;color:#fff}
.t-고스트{background:#4527a0;color:#fff}
.t-드래곤{background:#1565c0;color:#fff}
.t-악{background:#37474f;color:#fff}
.t-강철{background:#546e7a;color:#fff}
.t-페어리{background:#f06292;color:#fff}
.t-스텔라{background:linear-gradient(135deg,#e53935,#1565c0,#388e3c);color:#fff}

.class-물리{background:#c62828;color:#fff;border-color:#c62828!important}
.class-특수{background:#1565c0;color:#fff;border-color:#1565c0!important}
.class-변화{background:#2e7d32;color:#fff;border-color:#2e7d32!important}

/* ── 반응형 ── */
@media(max-width:600px){
  .move-grid{grid-template-columns:1fr}
  .filter-bar{gap:6px}
}
.site-footer{width:100%;max-width:700px;margin:60px auto 0;padding:24px 16px 8px;border-top:1px solid #252525;text-align:center;color:#555;font-size:0.78rem;line-height:1.9}
.site-footer a{color:#777;text-decoration:none;transition:color .2s}
.site-footer a:hover{color:#e53935}
.site-footer .footer-name{color:#888;font-weight:600}

/* ── 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:#181818;border:1px solid #333;border-radius:14px;width:100%;max-width:680px;padding:24px;position:relative;margin:auto}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:#888;font-size:1.4rem;cursor:pointer;line-height:1}
.modal-close:hover{color:#fff}

/* 모달 기술 정보 */
.modal-move-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.modal-move-name-ko{font-size:1.2rem;font-weight:800}
.modal-move-name-en{font-size:0.82rem;color:#888;margin-top:2px}
.modal-move-badges{display:flex;gap:6px;margin-left:auto}
.modal-move-stats{display:flex;gap:18px;font-size:0.82rem;color:#aaa;margin-bottom:12px;flex-wrap:wrap}
.modal-move-stats span{color:#e0e0e0;font-weight:600}
.modal-move-desc{font-size:0.84rem;color:#ccc;line-height:1.6;margin-bottom:4px}
.modal-move-gen{font-size:0.75rem;color:#555;margin-bottom:20px}

/* 배울 수 있는 포켓몬 */
.modal-section-title{font-size:0.82rem;font-weight:700;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #2a2a2a}
.learner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px}
.learner-card{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:8px 4px 6px;text-align:center;cursor:default;transition:border-color .15s}
.learner-card:hover{border-color:#555}
.learner-card img{width:56px;height:56px;object-fit:contain;image-rendering:auto}
.learner-name-ko{font-size:0.68rem;font-weight:600;margin-top:4px;color:#e0e0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.learner-name-en{font-size:0.6rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.learner-id{font-size:0.6rem;color:#555;margin-bottom:2px}
.modal-no-learner{color:#666;font-size:0.84rem;padding:16px 0}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="index.html">
      <div class="logo-ball"></div>
      <span class="logo-text">Poké<span>nova</span></span>
    </a>
    <nav class="site-nav">
      <a href="index.html"   class="site-nav-btn">🎴 퀴즈</a>
      <a href="pokedex.html" class="site-nav-btn">📖 포켓몬 도감</a>
      <a href="movedex.html" class="site-nav-btn active">⚔️ 기술 도감</a>
      <a href="entry.html"   class="site-nav-btn">🏆 배틀팀</a>
    </nav>
  </div>
</header>

<div class="container">
  <h1>기술 도감</h1>

  <div class="filter-bar">
    <div class="search-wrap">
      <input id="search" type="text" placeholder="기술명 검색..." oninput="render()" autocomplete="off" spellcheck="false">
    </div>
    <div class="filter-chips" id="type-chips"></div>
    <div class="filter-chips" id="class-chips"></div>
    <span class="count-label" id="count-label"></span>
  </div>

  <div class="move-grid" id="move-grid"></div>
</div>

<!-- 기술 상세 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
let allMoves    = [];
let allPokemon  = [];
let learnsets   = {};
let typeFilter  = '전체';
let classFilter = '전체';

// learnsets의 en은 하이픈, quiz_moves의 en은 공백 → 통일
function moveKey(en) { return (en || '').toLowerCase().replace(/\s+/g, '-'); }

async function init() {
  [allMoves, allPokemon, learnsets] = await Promise.all([
    fetch('data/quiz_moves.json').then(r => r.json()),
    fetch('data/quiz_pokemon.json').then(r => r.json()),
    fetch('data/learnsets.json').then(r => r.json()),
  ]);
  allMoves = allMoves.filter(m => !m.is_zmove && !m.hidden);

  buildChips();
  render();
}

function buildChips() {
  const types = ['전체', ...[...new Set(allMoves.map(m => m.type).filter(Boolean))].sort()];
  document.getElementById('type-chips').innerHTML = types.map(t => {
    const cls = t === '전체' ? '' : `t-${t}`;
    return `<button class="chip${t==='전체'?' active':''} ${cls}" data-t="${t}" onclick="setType('${t}')">${t}</button>`;
  }).join('');

  const classes = ['전체', '물리', '특수', '변화'];
  document.getElementById('class-chips').innerHTML = classes.map(c =>
    `<button class="chip${c==='전체'?' active':''}" data-c="${c}" onclick="setClass('${c}')">${c}</button>`
  ).join('');
}

function setType(t) {
  typeFilter = t;
  document.querySelectorAll('#type-chips .chip').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  render();
}

function setClass(c) {
  classFilter = c;
  document.querySelectorAll('#class-chips .chip').forEach(b => b.classList.toggle('active', b.dataset.c === c));
  render();
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let list = allMoves;
  if (typeFilter  !== '전체') list = list.filter(m => m.type  === typeFilter);
  if (classFilter !== '전체') list = list.filter(m => m.class === classFilter);
  if (q) list = list.filter(m =>
    (m.ko || '').toLowerCase().includes(q) ||
    (m.en || '').toLowerCase().includes(q)
  );

  document.getElementById('count-label').textContent = `${list.length}개`;

  document.getElementById('move-grid').innerHTML = list.map(m => {
    const pp    = m.pp    ?? '—';
    const power = m.power ?? '—';
    const acc   = m.accuracy ?? '—';
    return `
    <div class="move-card" onclick="openModal(${JSON.stringify(m).replace(/"/g,'&quot;')})">
      <div class="move-card-header">
        <div>
          <div class="move-name-ko">${m.ko}</div>
          <div class="move-name-en">${m.en}</div>
        </div>
        <div class="move-badges">
          <span class="badge-type t-${m.type}">${m.type}</span>
          <span class="badge-class class-${m.class}">${m.class}</span>
        </div>
      </div>
      <div class="move-stats">
        <div>PP <span>${pp}</span></div>
        <div>위력 <span>${power}</span></div>
        <div>명중 <span>${acc}</span></div>
        <div style="margin-left:auto">${m.gen || ''}</div>
      </div>
      <div class="move-desc">${m.desc || ''}</div>
    </div>`;
  }).join('');
}

/* ── 모달 ── */
function openModal(m) {
  const key = moveKey(m.en);

  // 이 기술을 배울 수 있는 포켓몬 찾기 (도감순)
  const learners = allPokemon.filter(p => {
    const lsEntry = learnsets[p.en.toLowerCase()];
    return lsEntry && lsEntry.some(mv => mv.en === key);
  }).sort((a, b) => a.id - b.id);

  const pp    = m.pp    ?? '—';
  const power = m.power ?? '—';
  const acc   = m.accuracy ?? '—';

  const learnerHTML = learners.length
    ? `<div class="learner-grid">` + learners.map(p => `
        <div class="learner-card">
          <div class="learner-id">#${String(p.id).padStart(3,'0')}</div>
          <img src="${p.sprite}" alt="${p.ko}" loading="lazy">
          <div class="learner-name-ko">${p.ko}</div>
          <div class="learner-name-en">${p.en}</div>
        </div>`).join('') + `</div>`
    : `<div class="modal-no-learner">이 기술을 배울 수 있는 포켓몬 정보가 없습니다.</div>`;

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-move-header">
      <div>
        <div class="modal-move-name-ko">${m.ko}</div>
        <div class="modal-move-name-en">${m.en}</div>
      </div>
      <div class="modal-move-badges">
        <span class="badge-type t-${m.type}">${m.type}</span>
        <span class="badge-class class-${m.class}">${m.class}</span>
      </div>
    </div>
    <div class="modal-move-stats">
      <div>PP <span>${pp}</span></div>
      <div>위력 <span>${power}</span></div>
      <div>명중 <span>${acc}</span></div>
    </div>
    <div class="modal-move-desc">${m.desc || ''}</div>
    <div class="modal-move-gen">${m.gen || ''}</div>
    <div class="modal-section-title">이 기술을 배울 수 있는 포켓몬 <span style="color:#666;font-weight:400">(${learners.length}마리)</span></div>
    ${learnerHTML}
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

init();
</script>

  <div>Made by <span class="footer-name">잉짱</span> &nbsp;·&nbsp; <a href="mailto:soondoree07@gmail.com">soondoree07@gmail.com</a></div>

  </div>
  <div style="margin-top:8px; font-size:0.72rem;">© 2026 Pokénova</div>
</footer>
</body>
</html>
