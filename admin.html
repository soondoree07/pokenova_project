<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 패널 · Pokénova</title>

  <style>
    :root {
      --bg:      #0a0a16;
      --surface: #10102a;
      --card:    #14142e;
      --border:  #1e1e40;
      --text:    #e0e0f0;
      --muted:   #555570;
      --yellow:  #f5c518;
      --green:   #4caf50;
      --red:     #f44336;
      --blue:    #4a9eff;
      --orange:  #ff9800;
      --purple:  #9c6fff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══ 로그인 화면 ══ */
    #screen-login {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); z-index: 100;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-logo  { text-align: center; font-size: 2.4rem; margin-bottom: 4px; }
    .login-title { text-align: center; font-size: 1.1rem; font-weight: 900; color: var(--yellow); letter-spacing: 1px; }
    .login-sub   { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: -8px; }

    .login-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }

    .login-input {
      width: 100%; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: 1rem; outline: none;
      transition: border-color .18s; letter-spacing: 2px;
    }
    .login-input:focus { border-color: var(--yellow); }

    .login-btn {
      width: 100%; padding: 13px; border-radius: 12px; border: none;
      background: var(--yellow); color: #0a0a16;
      font-size: 0.95rem; font-weight: 900; cursor: pointer; transition: opacity .18s;
    }
    .login-btn:hover { opacity: .88; }

    .login-error { text-align: center; font-size: 0.82rem; color: var(--red); min-height: 18px; margin-top: -8px; }

    .login-shake { animation: shake .35s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    /* ══ 상단 네비 바 ══ */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      height: 56px;
      background: rgba(10,10,22,.97);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 28px; gap: 16px;
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .topbar-logo  { font-weight: 900; color: var(--yellow); font-size: 0.95rem; letter-spacing: 1px; }
    .topbar-badge {
      background: rgba(156,111,255,.18); color: var(--purple);
      border: 1px solid var(--purple); border-radius: 20px;
      font-size: 0.68rem; font-weight: 700; padding: 2px 10px; letter-spacing: 1px;
    }
    .topbar-spacer { flex: 1; }
    .topbar-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.8rem; cursor: pointer;
      transition: all .18s; text-decoration: none;
    }
    .topbar-btn:hover         { border-color: var(--yellow); color: var(--yellow); }
    .topbar-btn.danger:hover  { border-color: var(--red); color: var(--red); }
    .topbar-btn.blue:hover    { border-color: var(--blue); color: var(--blue); }

    /* ══ 메인 ══ */
    .main {
      flex: 1; padding: 28px;
      max-width: 1300px; width: 100%;
      margin: 0 auto;
      display: flex; flex-direction: column; gap: 28px;
    }

    .section-title {
      font-size: 0.72rem; font-weight: 700; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
    }

    /* ══ Firebase 안내 배너 ══ */
    .firebase-banner {
      background: rgba(74,158,255,.07);
      border: 1px solid rgba(74,158,255,.25);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.82rem; color: var(--blue); line-height: 1.6;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .firebase-banner-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

    /* ══ 개요 통계 그리드 ══ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .stats-grid { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 22px 22px 18px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.c1::before { background: linear-gradient(90deg, var(--yellow), #ffaa00); }
    .stat-card.c2::before { background: linear-gradient(90deg, var(--green), #00c853); }
    .stat-card.c3::before { background: linear-gradient(90deg, var(--red), #ff5722); }
    .stat-card.c4::before { background: linear-gradient(90deg, var(--blue), #00b4ff); }

    .stat-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .stat-value { font-size: 2.4rem; font-weight: 900; line-height: 1; }
    .stat-card.c1 .stat-value { color: var(--yellow); }
    .stat-card.c2 .stat-value { color: var(--green); }
    .stat-card.c3 .stat-value { color: var(--red); }
    .stat-card.c4 .stat-value { color: var(--blue); }
    .stat-sub  { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
    .stat-icon { position: absolute; right: 18px; top: 18px; font-size: 1.6rem; opacity: .15; }

    /* ══ 패널 ══ */
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 22px 24px;
    }

    /* ══ 2열 그리드 ══ */
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 800px) { .row-2 { grid-template-columns: 1fr; } }

    /* ══ 퀴즈별 통계 그리드 ══ */
    .quiz-stat-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
    }
    @media (max-width: 900px) { .quiz-stat-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 500px) { .quiz-stat-grid { grid-template-columns: 1fr; } }

    .quiz-stat-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
    }
    .qsb-title { font-size: 0.82rem; font-weight: 700; margin-bottom: 10px; color: var(--text); }
    .qsb-row   { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .qsb-row:last-child { border-bottom: none; }
    .qsb-label { font-size: 0.72rem; color: var(--muted); }
    .qsb-val   { font-size: 0.88rem; font-weight: 700; color: var(--text); }

    /* ══ 테이블 ══ */
    .table-controls {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.78rem; cursor: pointer; transition: all .15s;
    }
    .filter-btn:hover  { border-color: var(--yellow); color: var(--yellow); }
    .filter-btn.active { background: var(--yellow); color: #0a0a16; border-color: var(--yellow); }
    .filter-btn.orange.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    .table-count { font-size: 0.78rem; color: var(--muted); white-space: nowrap; margin-left: auto; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead th {
      padding: 9px 12px; text-align: left;
      font-size: 0.67rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { transition: background .12s; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(30,30,64,.6);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700;
    }
    .badge-yellow  { background: rgba(245,197,24,.12);  color: var(--yellow); }
    .badge-green   { background: rgba(76,175,80,.12);   color: var(--green); }
    .badge-red     { background: rgba(244,67,54,.12);   color: var(--red); }
    .badge-blue    { background: rgba(74,158,255,.12);  color: var(--blue); }
    .badge-orange  { background: rgba(255,152,0,.12);   color: var(--orange); }
    .badge-purple  { background: rgba(156,111,255,.12); color: var(--purple); }
    .badge-muted   { background: rgba(85,85,112,.12);   color: var(--muted); }

    .time-str { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    .empty-row td { text-align: center; padding: 36px; color: var(--muted); font-size: 0.85rem; }

    /* ══ 신고 처리 버튼 ══ */
    .btn-resolve {
      padding: 3px 10px; border-radius: 7px; font-size: 0.72rem; font-weight: 700;
      border: 1px solid rgba(76,175,80,.4); background: rgba(76,175,80,.08);
      color: var(--green); cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-resolve:hover { background: rgba(76,175,80,.2); }
    .btn-resolve:disabled { opacity: .4; cursor: default; }

    .btn-delete {
      padding: 3px 10px; border-radius: 7px; font-size: 0.72rem; font-weight: 700;
      border: 1px solid rgba(244,67,54,.3); background: transparent;
      color: var(--red); cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-delete:hover { background: rgba(244,67,54,.12); }

    /* ══ 데이터 초기화 버튼 ══ */
    .btn-danger-full {
      padding: 9px 18px; border-radius: 10px;
      border: 1px solid rgba(244,67,54,.4); background: transparent;
      color: var(--red); font-size: 0.82rem; font-weight: 700; cursor: pointer;
      transition: all .18s;
    }
    .btn-danger-full:hover { background: rgba(244,67,54,.12); border-color: var(--red); }

    .divider { height: 1px; background: var(--border); }

    .accuracy-cell { display: flex; align-items: center; gap: 8px; }
    .acc-bar-bg    { width: 48px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .acc-bar-fill  { height: 100%; border-radius: 2px; background: var(--green); }

    /* ══ 모바일 반응형 ══ */
    @media (max-width: 600px) {
      .topbar { padding: 0 14px; gap: 8px; }
      .topbar-logo { font-size: 0.82rem; }
      .topbar-badge { padding: 2px 7px; font-size: 0.62rem; }
      .topbar-btn { padding: 5px 10px; font-size: 0.75rem; }
      .main { padding: 16px 12px; gap: 18px; }
      .login-box { padding: 32px 22px 28px; }
      .stat-value { font-size: 1.9rem; }
      .panel { padding: 16px 14px; }
      .filter-btn { padding: 6px 10px; min-height: 34px; }
    }
    @media (max-width: 400px) {
      .topbar-btn { padding: 4px 8px; font-size: 0.7rem; }
      .topbar-logo { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ 로그인 화면 ══ -->
<div id="screen-login">
  <div class="login-box" id="login-box">
    <div class="login-logo">🛡️</div>
    <div class="login-title">관리자 패널</div>
    <div class="login-sub">Pokénova</div>
    <div>
      <div class="login-label">비밀번호</div>
      <input type="password" class="login-input" id="pw-input"
        placeholder="••••••••"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">입장</button>
  </div>
</div>

<!-- ══ 대시보드 ══ -->
<div id="screen-dashboard" style="display:none">

  <!-- 탑바 -->
  <nav class="topbar">
    <span class="topbar-logo">Pokénova</span>
    <span class="topbar-badge">ADMIN</span>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" onclick="loadDashboard()">↺ 새로고침</button>
    <a href="index.html" class="topbar-btn blue">← 메인 사이트</a>
    <button class="topbar-btn danger" onclick="doLogout()">로그아웃</button>
  </nav>

  <div class="main">

    <!-- ══ Firebase 안내 배너 ══ -->
    <div class="firebase-banner">
      <span class="firebase-banner-icon">📡</span>
      <span>Firebase 연결 중...</span>
    </div>

    <!-- ══ 섹션: 개요 통계 ══ -->
    <div>
      <div class="section-title">개요</div>
      <div class="stats-grid">
        <div class="stat-card c1">
          <div class="stat-icon">🎮</div>
          <div class="stat-label">총 게임 세션</div>
          <div class="stat-value" id="stat-sessions">—</div>
          <div class="stat-sub">저장된 게임 기록</div>
        </div>
        <div class="stat-card c2">
          <div class="stat-icon">✅</div>
          <div class="stat-label">총 정답 수</div>
          <div class="stat-value" id="stat-total-correct">—</div>
          <div class="stat-sub">전체 모드 합계</div>
        </div>
        <div class="stat-card c3">
          <div class="stat-icon">⚠️</div>
          <div class="stat-label">미처리 신고</div>
          <div class="stat-value" id="stat-pending-reports">—</div>
          <div class="stat-sub">처리 대기 중</div>
        </div>
        <div class="stat-card c4">
          <div class="stat-icon">📅</div>
          <div class="stat-label">오늘 플레이</div>
          <div class="stat-value" id="stat-today-play">—</div>
          <div class="stat-sub">오늘 게임 종료 수</div>
        </div>
      </div>
    </div>

    <!-- ══ 섹션: 퀴즈별 통계 ══ -->
    <div>
      <div class="section-title">퀴즈별 통계</div>
      <div class="quiz-stat-grid" id="quiz-stat-grid">
        <!-- JS로 렌더 -->
      </div>
    </div>

    <!-- ══ 섹션: 오류 신고 로그 ══ -->
    <div class="panel">
      <div class="section-title">오류 신고 로그</div>
      <div class="table-controls">
        <div class="filter-btns">
          <button class="filter-btn orange active" id="rf-pending" onclick="setReportFilter('pending')">미처리만</button>
          <button class="filter-btn orange" id="rf-all" onclick="setReportFilter('all')">전체</button>
        </div>
        <span class="table-count" id="report-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>시간</th>
              <th>모드</th>
              <th>문제명 (한국어)</th>
              <th>신고 유형</th>
              <th>메모</th>
              <th>상태</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="report-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ══ 섹션: 게임 세션 데이터 ══ -->
    <div class="panel">
      <div class="section-title">게임 세션 데이터</div>
      <div class="table-controls">
        <div class="filter-btns">
          <button class="filter-btn active" id="sf-all"     onclick="setSessionFilter('all')">전체</button>
          <button class="filter-btn" id="sf-pokemon"        onclick="setSessionFilter('pokemon')">포켓몬</button>
          <button class="filter-btn" id="sf-move"           onclick="setSessionFilter('move')">기술</button>
          <button class="filter-btn" id="sf-ability"        onclick="setSessionFilter('ability')">특성</button>
          <button class="filter-btn" id="sf-item"           onclick="setSessionFilter('item')">도구</button>
        </div>
        <span class="table-count" id="session-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>시간</th>
              <th>모드</th>
              <th>난이도</th>
              <th>정답</th>
              <th>오답</th>
              <th>정확도</th>
            </tr>
          </thead>
          <tbody id="session-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ══ 섹션: 데이터 관리 ══ -->
    <div class="panel">
      <div class="section-title">데이터 관리</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div style="font-size:0.83rem;color:var(--muted);line-height:1.6">
          localStorage에 저장된 게임 세션 및 신고 데이터를 모두 삭제합니다.<br>
          <span style="color:var(--red);font-size:0.78rem">이 작업은 되돌릴 수 없습니다.</span>
        </div>
        <button class="btn-danger-full" onclick="clearAllData()">🗑️ 데이터 전체 초기화</button>
      </div>
    </div>

  </div><!-- /.main -->
</div><!-- /#screen-dashboard -->

<script>
/* ══ 관리자 비밀번호 ══ */
const ADMIN_PASSWORD = "qkrwjdgur07";

/* ══ 상태 ══ */
let reportFilter  = 'pending';
let sessionFilter = 'all';

/* ══ 로그인 ══ */
function doLogin() {
  const val = document.getElementById('pw-input').value;
  const errEl = document.getElementById('login-error');
  const box   = document.getElementById('login-box');

  if (val === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-dashboard').style.display = 'block';
    loadDashboard();
  } else {
    errEl.textContent = '비밀번호가 올바르지 않습니다.';
    box.classList.remove('login-shake');
    void box.offsetWidth;
    box.classList.add('login-shake');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function doLogout() {
  sessionStorage.removeItem('admin_auth');
  document.getElementById('screen-dashboard').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').textContent = '';
}

/* 세션 유지 */
if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-dashboard').style.display = 'block';
  setTimeout(loadDashboard, 0);
}

/* ══ 시간 포맷 ══ */
function fmtTime(ms) {
  if (!ms) return '—';
  const diff = Date.now() - ms;
  const sec = Math.floor(diff / 1000);
  if (sec < 60)     return '방금';
  if (sec < 3600)   return Math.floor(sec / 60) + '분 전';
  if (sec < 86400)  return Math.floor(sec / 3600) + '시간 전';
  if (sec < 604800) return Math.floor(sec / 86400) + '일 전';
  const d = new Date(ms);
  return d.getFullYear() + '.' +
    String(d.getMonth()+1).padStart(2,'0') + '.' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0');
}

function isToday(ms) {
  const d = new Date(ms), n = new Date();
  return d.getFullYear() === n.getFullYear() &&
         d.getMonth()    === n.getMonth()    &&
         d.getDate()     === n.getDate();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══ 데이터 로드 (Firestore 우선, localStorage 백업) ══ */
async function getSessions() {
  if (window._adminGetSessions) {
    try { return await window._adminGetSessions(); } catch(e) { console.warn('Firestore sessions:', e); }
  }
  return JSON.parse(localStorage.getItem('pq_sessions') || '[]');
}
async function getReports() {
  if (window._adminGetReports) {
    try { return await window._adminGetReports(); } catch(e) { console.warn('Firestore reports:', e); }
  }
  return JSON.parse(localStorage.getItem('pq_reports') || '[]');
}

/* ══ 대시보드 전체 렌더 ══ */
async function loadDashboard() {
  const [sessions, reports] = await Promise.all([getSessions(), getReports()]);
  renderOverviewStats(sessions, reports);
  renderQuizStats(sessions);
  renderReportTable(reports);
  renderSessionTable(sessions);
}

/* ── 개요 통계 ── */
function renderOverviewStats(sessions, reports) {
  const totalCorrect  = sessions.reduce((s, x) => s + (x.correct || 0), 0);
  const pendingCount  = reports.filter(r => !r.resolved).length;
  const todayCount    = sessions.filter(s => isToday(s.ts)).length;

  document.getElementById('stat-sessions').textContent       = sessions.length;
  document.getElementById('stat-total-correct').textContent  = totalCorrect;
  document.getElementById('stat-pending-reports').textContent = pendingCount;
  document.getElementById('stat-today-play').textContent     = todayCount;
}

/* ── 퀴즈별 통계 ── */
function renderQuizStats(sessions) {
  const modes = [
    { key: 'pokemon', label: '🎴 포켓몬 맞추기' },
    { key: 'move',    label: '⚔️ 기술 맞추기' },
    { key: 'ability', label: '✨ 특성 맞추기' },
    { key: 'item',    label: '🎒 도구 맞추기' },
  ];

  const grid = document.getElementById('quiz-stat-grid');
  grid.innerHTML = modes.map(m => {
    const list = sessions.filter(s => s.mode === m.key);
    const totalPlay = list.length;
    const avgCorrect = totalPlay
      ? (list.reduce((s,x) => s + (x.correct||0), 0) / totalPlay).toFixed(1)
      : '—';
    const maxCorrect = totalPlay
      ? Math.max(...list.map(x => x.correct || 0))
      : '—';
    const totalCorrect = totalPlay
      ? list.reduce((s,x) => s + (x.correct||0), 0)
      : 0;

    return `<div class="quiz-stat-box">
      <div class="qsb-title">${esc(m.label)}</div>
      <div class="qsb-row"><span class="qsb-label">총 플레이</span><span class="qsb-val">${totalPlay}</span></div>
      <div class="qsb-row"><span class="qsb-label">총 정답</span><span class="qsb-val">${totalCorrect}</span></div>
      <div class="qsb-row"><span class="qsb-label">평균 정답</span><span class="qsb-val">${avgCorrect}</span></div>
      <div class="qsb-row"><span class="qsb-label">최고 정답</span><span class="qsb-val">${maxCorrect}</span></div>
    </div>`;
  }).join('');
}

/* ── 신고 필터 ── */
function setReportFilter(f) {
  reportFilter = f;
  document.getElementById('rf-pending').classList.toggle('active', f === 'pending');
  document.getElementById('rf-all').classList.toggle('active', f === 'all');
  getReports().then(renderReportTable);
}

/* ── 신고 테이블 ── */
function renderReportTable(reports) {
  const rows = reportFilter === 'pending' ? reports.filter(r => !r.resolved) : reports;
  document.getElementById('report-count').textContent = rows.length ? rows.length + '건' : '';

  const tbody = document.getElementById('report-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">신고 없음</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const statusBadge = r.resolved
      ? '<span class="badge badge-muted">처리완료</span>'
      : '<span class="badge badge-orange">미처리</span>';
    const resolveBtn = r.resolved
      ? '<button class="btn-resolve" disabled>완료</button>'
      : `<button class="btn-resolve" onclick="resolveReport('${esc(r.id)}')">처리완료</button>`;

    return `<tr>
      <td><span class="time-str">${fmtTime(r.ts)}</span></td>
      <td><span class="badge badge-blue">${esc(r.modeLabel || r.mode)}</span></td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.ko || r.en || '—')}</td>
      <td><span class="badge badge-yellow">${esc(r.type || '—')}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:0.8rem">${esc(r.memo || '—')}</td>
      <td>${statusBadge}</td>
      <td style="display:flex;gap:6px;align-items:center">${resolveBtn}<button class="btn-delete" onclick="deleteReport('${esc(r.id)}')">삭제</button></td>
    </tr>`;
  }).join('');
}

async function resolveReport(id) {
  // localStorage
  const arr = JSON.parse(localStorage.getItem('pq_reports') || '[]');
  const idx = arr.findIndex(r => r.id === id);
  if (idx !== -1) { arr[idx].resolved = true; localStorage.setItem('pq_reports', JSON.stringify(arr)); }
  // Firestore
  if (window._adminResolveReport) await window._adminResolveReport(id).catch(()=>{});
  loadDashboard();
}

async function deleteReport(id) {
  if (!confirm('이 신고를 삭제하시겠습니까?')) return;
  // localStorage
  const arr = JSON.parse(localStorage.getItem('pq_reports') || '[]').filter(r => r.id !== id);
  localStorage.setItem('pq_reports', JSON.stringify(arr));
  // Firestore
  if (window._adminDeleteReport) await window._adminDeleteReport(id).catch(()=>{});
  loadDashboard();
}

/* ── 세션 필터 ── */
function setSessionFilter(f) {
  sessionFilter = f;
  ['all','pokemon','move','ability','item'].forEach(k => {
    const el = document.getElementById('sf-' + k);
    if (el) el.classList.toggle('active', k === f);
  });
  getSessions().then(renderSessionTable);
}

/* ── 세션 테이블 ── */
const MODE_BADGE_CLASS = {
  pokemon: 'badge-green',
  move:    'badge-blue',
  ability: 'badge-purple',
  item:    'badge-yellow',
};

function renderSessionTable(sessions) {
  let rows = sessionFilter === 'all' ? sessions : sessions.filter(s => s.mode === sessionFilter);
  rows = rows.slice(0, 100);
  document.getElementById('session-count').textContent = rows.length ? rows.length + '개 (최근 100)' : '';

  const tbody = document.getElementById('session-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">세션 데이터 없음</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(s => {
    const total = (s.correct || 0) + (s.wrong || 0);
    const acc   = total > 0 ? Math.round((s.correct / total) * 100) : 0;
    const accColor = acc >= 70 ? 'var(--green)' : acc >= 40 ? 'var(--yellow)' : 'var(--red)';
    const badgeCls = MODE_BADGE_CLASS[s.mode] || 'badge-muted';

    return `<tr>
      <td><span class="time-str">${fmtTime(s.ts)}</span></td>
      <td><span class="badge ${badgeCls}">${esc(s.modeLabel || s.mode)}</span></td>
      <td><span style="font-size:0.8rem;color:var(--muted)">${esc(s.difficulty || '—')}</span></td>
      <td><span class="badge badge-green">${s.correct || 0}</span></td>
      <td><span class="badge badge-red">${s.wrong || 0}</span></td>
      <td>
        <div class="accuracy-cell">
          <span style="font-size:0.85rem;font-weight:700;color:${accColor}">${acc}%</span>
          <div class="acc-bar-bg"><div class="acc-bar-fill" style="width:${acc}%"></div></div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

/* ── 전체 초기화 ── */
function clearAllData() {
  if (!confirm('게임 세션 및 신고 데이터를 모두 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  localStorage.removeItem('pq_sessions');
  localStorage.removeItem('pq_reports');
  alert('데이터가 초기화되었습니다.');
  loadDashboard();
}
</script>

  window._adminDeleteReport = async (customId) => {
